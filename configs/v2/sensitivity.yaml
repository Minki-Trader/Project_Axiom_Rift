schema: axiom_rift_v2_sensitivity_config_v1
status: active
encoding: ascii_only
policy_ref: contracts/v2/sensitivity_policy.yaml
limits:
  knobs_max: 2
  base_and_extreme_variants_max: 5
  local_calibration_rounds_max: 1
  local_calibration_new_evaluations_per_outer_fold_max: 1
  local_candidate_set_including_bracket_max: 3
  development_paths_per_fold_max: 1
  automatic_range_extension_max: 0
  cartesian_product_allowed: false
  development_extremes_allowed: false
allowed_parameters:
  V2MP0001.alpha:
    value_type: positive_float
    minimum_exclusive: 0.0
    maximum_inclusive: 1000000.0
    scale: log
    effect_scope: model_refit
    local_calibration_allowed: true
  V2CP0001.quantile:
    value_type: float
    minimum_exclusive: 0.0
    maximum_exclusive: 1.0
    scale: linear
    effect_scope: calibration_replay
    local_calibration_allowed: true
structural_parameter_fragments:
  - hold
  - horizon
  - stop
  - target
  - lifecycle
structural_action: require_distinct_program_and_hypothesis
identity_layers:
  hash_semantics: compact_sorted_ascii_json_sha256
  executable_configuration:
    - executable_program_payload
    - resolved_numeric_parameters
  fold_evaluation:
    - executable_configuration_hash
    - data_role
    - split_ids
  selected_path:
    - fold_evaluation_hash
    - selection_rule_hash
    - selected_model_bundle_hash
surface:
  primary_metric_and_thresholds_source: preregistered_hypothesis
  scale_floor_source: preregistered_hypothesis
  plateau_span_source: preregistered_hypothesis
  needle_advantage_source: preregistered_hypothesis
  boundary_step_source: preregistered_hypothesis
  fold_agreement_source: preregistered_hypothesis
local_calibration:
  generation: one_strict_interior_midpoint
  selection: passing_midpoint_else_baseline
  second_round_allowed: false
selection_feasibility:
  causal_checks_required: true
  unknown_cost_observation_count_max: 0
  evaluable_trade_count_min_per_fold:
    value_type: positive_integer
    source: preregistered_hypothesis
  infeasible_surface_action: freeze_baseline_and_block_promotion
trial_history:
  history_hash_semantics: compact_sorted_ascii_json_sha256
  durable_source: completed_nested_scout_receipts
  same_configuration_same_family_counts_again: false
  semantic_family_rename_resets_global_trial_count: false
  global_history_required: true
runtime:
  final_numeric_value_frozen_before_M: true
  live_retuning_allowed: false
