schema: axiom_rift_v2_feature_program_v1
status: active_reference
encoding: ascii_only
program_id: V2FP0001
name: causal_completed_bar_state_v1
input:
  bar_schema: mql_rates_equivalent
  time_semantics: broker_server_bar_open
  decision_time: bar_open_plus_5_minutes
  market_time: decision_time_minus_7_hours
  point_size: 0.01
output:
  dtype: float32
  shape:
    - 12
  feature_order_sha256: 36c24bfec2f73634af87daaa9906d597f8502c743c40c581f4eb91b61006ef29
warmup_bars: 48
missing_value_behavior: reject_sample
availability: completed_bar_only
zero_spread_behavior: reject_as_unknown_cost
real_volume_eligible: false
features:
  - name: log_return_1
    formula: log(close_t / close_t_minus_1)
  - name: log_return_3
    formula: log(close_t / close_t_minus_3)
  - name: log_return_12
    formula: log(close_t / close_t_minus_12)
  - name: realized_vol_12
    formula: population_std_of_12_one_bar_log_returns_ending_t
  - name: realized_vol_48
    formula: population_std_of_48_one_bar_log_returns_ending_t
  - name: true_range_ratio_24
    formula: true_range_t / mean_true_range_t_minus_23_through_t
  - name: body_ratio_24
    formula: abs(close_t_minus_open_t) / mean_true_range_t_minus_23_through_t
  - name: close_location
    formula: (close_t_minus_low_t) / (high_t_minus_low_t)
  - name: tick_volume_z_48
    formula: zscore_tick_volume_over_t_minus_47_through_t_population_std
  - name: spread_ratio_24
    formula: spread_t / mean_positive_spread_t_minus_23_through_t
  - name: time_of_day_sin
    formula: sin_2pi_new_york_decision_minute_over_1440
  - name: time_of_day_cos
    formula: cos_2pi_new_york_decision_minute_over_1440
normalization:
  owner: train_is_only
  method: standard_scaler_population_std
  zero_scale_behavior: replace_with_one
portability:
  python: required
  onnx: fixed_float32_vector_to_score
  mql5: required
claim_ceiling: none
