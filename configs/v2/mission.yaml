schema: axiom_rift_v2_mission_config_v1
status: active
encoding: ascii_only
template:
  mission_id: AXIOM_ROOT_0001
  initial_status: ready
  user_goal_repeat_required: false
  current_machine_only: true
  external_review: false
  human_intermediate_approval: false
  active_mutation_jobs_max: 1
budget_defaults:
  role: bootstrap_fixture_not_future_scientific_ceiling
  hypothesis_batches_max: 12
  scout_jobs_max: 12
  confirmation_jobs_max: 4
  promotion_candidates_max: 2
  full_nine_fold_mt5_batches_max: 2
  holdout_reveals_max: 1
  implementation_batches_per_slice_max: 1
  validation_batches_per_slice_max: 1
  repair_batches_per_slice_max: 1
  recheck_batches_per_slice_max: 1
  identical_validation_retries_max: 0
  freeze_on_mission_open: true
  results_may_increase_budget: false
future_scientific_mission_open:
  compute_capacity_role: nonbinding
  rolling_research_windows: true
  emergency_hypothesis_ceiling_required: true
  emergency_hypothesis_ceiling_default: null
  result_independent_before_first_H: true
  high_information_unseen_axes_continue: true
bounded_parameter_discovery:
  unregistered_adjacent_retries_max: 0
  sensitivity_batches_per_hypothesis_max: 1
  knobs_per_hypothesis_max: 2
  base_and_extreme_variants_max: 5
  local_calibration_rounds_max: 1
  local_calibration_new_evaluations_per_outer_fold_max: 1
  local_candidate_set_including_bracket_max: 3
  automatic_range_extension_max: 0
  development_extreme_variants_max: 0
terminal_policy:
  allowed:
    - completed_pre_live_handoff
    - closed_no_candidate
    - blocked_external
    - stopped_by_user
  closed_no_candidate_requires_material_exhaustion_receipt: true
continue_requires:
  - executable_identity_is_materially_distinct
  - expected_information_value_is_positive
  - causal_execution_is_possible_on_current_data
  - cost_fits_remaining_budget
  - negative_memory_does_not_directly_refute
  - not_unregistered_adjacent_retry
exhaustion_conditions:
  - only_exhausted_or_forbidden_local_tuning_remains
  - negative_memory_refutes_remaining_structures
  - current_data_cannot_identify_remaining_axes
  - mission_budget_exhausted
  - progress_requires_holdout_reuse
  - expected_information_value_is_below_cost
