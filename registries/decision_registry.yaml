      runtime_authority: false
      live_ready: false
      label_selected: false
      feature_set_selected: false
      model_selected: false
  - decision_id: dec_20260701_mandatory_mt5_paired_run_validation
    created_local_date: 2026-07-01
    status: active
    decision: disallow_proxy_only_scouts_and_require_mt5_paired_run_validation
    refines:
      - dec_20260630_developer_campaign_layout
    rationale:
      - every_run_must_have_proxy_mt5_and_proxy_vs_mt5_evidence_before_closeout
      - weak_proxy_results_must_not_skip_mt5_probe_by_default
      - proxy_evidence_is_not_enough_for_run_judgment
      - mt5_probe_evidence_still_does_not_create_runtime_authority
