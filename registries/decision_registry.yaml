    status: active
    decision: use_top_level_sc_synthesis_units_under_campaigns_root
    refines:
      - dec_20260630_developer_campaign_layout
    rationale:
      - synthesis_units_must_be_distinct_from_campaign_runs
      - c_campaigns_hold_major_hypotheses
      - sc_synthesis_units_open_from_accumulated_synthesis_readiness
      - sc_units_must_not_be_nested_inside_c_campaign_folders
