      runtime_probe_completed: false
      economics_pass: false
      runtime_authority: false
      live_ready: false
      label_selected: false
      feature_set_selected: false
      model_selected: false
  - decision_id: dec_20260701_bootstrap_skills_are_temporary
    created_local_date: 2026-07-01
    status: active
    decision: treat_axiom_bootstrap_skills_as_temporary_planning_aids_not_complete_official_skills
    rationale:
      - bootstrap_skills_help_structure_campaign_and_prp_like_planning
      - bootstrap_skills_do_not_make_axiom_skills_complete
      - bootstrap_skills_must_not_create_runtime_promotion_onnx_or_live_claims
