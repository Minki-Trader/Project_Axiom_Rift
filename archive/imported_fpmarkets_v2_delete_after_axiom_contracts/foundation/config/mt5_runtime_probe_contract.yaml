version: mt5_runtime_probe_contract_v1
standard_probe_profile: standard_runtime_probe
canonical_periods:
  validation_is:
    source_split: validation
    from_date: "2025.01.02"
    to_date: "2025.10.01"
  oos:
    source_split: oos
    from_date: "2025.10.01"
    to_date: "2026.04.13"
stage_native_oos_horizon:
  normal_scope_end_date: "2026.04.13"
  do_not_extend_to_date: "2026.06.18"
  policy: use_existing_stage_oos_horizon_when_validation_is_exists_and_oos_reaches_2026_04
  repair_development_period: same_as_stage_native_oos_horizon
  claim_effect: "A valid validation_is plus OOS surface through the stage-native April 2026 horizon must not be blocked for missing June 2026 tail rows."
completion:
  required_splits:
    - validation_is
    - oos
  required_report_status: completed
  runtime_probe_completed_requires_all_required_splits: true
  runtime_probe_completed_requires_reports_for_all_standard_attempts: true
  runtime_probe_completed_requires_surface_contract: true
  allowed_surface_scopes_for_completion:
    - full_period_deterministic
    - full_period_sparse_decision_surface
  forbidden_source_artifact_roles_for_completion:
    - diagnostic_sample
    - proxy_score_sample
    - score_sample
    - sampled_rows
    - preview_rows
execution:
  terminal_mode: portable_required
  required_terminal_args:
    - /portable
  tester:
    Symbol: US100
    Period: M5
    Model: 4
    Deposit: 500
    Leverage: "1:100"
    UseLocal: 1
    UseRemote: 0
    UseCloud: 0
    ReplaceReport: 1
    ShutdownTerminal: 1
exception_profiles:
  materialization_smoke:
    completion_claim_allowed: false
    reason_code: materialization_smoke_only
  debug_reproduction:
    completion_claim_allowed: false
    reason_code: debug_reproduction_only
  specific_period_probe:
    completion_claim_allowed: false
    reason_code: explicit_specific_period_only
  regime_slice_probe:
    completion_claim_allowed: false
    reason_code: explicit_regime_slice_only
  source_replay:
    completion_claim_allowed: false
    reason_code: historical_source_replay_only
