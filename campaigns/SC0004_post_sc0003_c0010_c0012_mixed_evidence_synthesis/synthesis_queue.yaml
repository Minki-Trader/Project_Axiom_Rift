    mt5_logic_parity_kpi: runs/SR0001/kpi/mt5_logic_parity.json
    mt5_tick_kpi: runs/SR0001/kpi/mt5_tick.json
    proxy_vs_mt5_logic_parity_kpi: runs/SR0001/kpi/proxy_vs_mt5_logic_parity.json
