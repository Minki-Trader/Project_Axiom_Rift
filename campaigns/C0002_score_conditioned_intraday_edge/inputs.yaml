schema: axiom_rift_campaign_inputs_v1
template: false
status: open

work_unit_id: C0002

market:
  broker: FPMarkets
  symbol: US100
  timeframe: M5
  base_frame: closed_m5_us100
  config_ref: configs/market.yaml

data_refs:
  raw_data_allowed_in_campaign_folder: false
  processed_data_allowed_in_campaign_folder: false
  base_dataset_ref: data/processed/datasets/us100_m5_base_frame.csv
  clean_period_registry: registries/clean_periods.yaml
  split_registry: registries/rolling_windows.yaml
  dataset_identity: data/processed/datasets/us100_m5_base_frame.csv
  split_policy: rolling_window

fixed_constraints:
  - closed_m5_bar_only
  - no_future_leakage
  - external_alignment_to_us100_closed_timestamp
  - fixed_lot_early_discovery
  - equity_percent_sizing_deferred_until_candidate_quality
  - mt5_paired_validation_required_for_opened_runs

variable_surfaces:
  - model
  - feature
  - trade_logic
  - label

artifact_policy:
  lineage_contract: contracts/artifact_lineage.yaml
  record_repo_relative_paths: true
  record_sha256_for_durable_artifacts: true

claim_boundary:
  claim_authority: false
  selected: false
  runtime_authority: false
  live_ready: false
