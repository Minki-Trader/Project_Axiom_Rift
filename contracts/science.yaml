schema: science_contract
status: active
identity_profile: axiom_cjson_v1
market_target: FPMarkets_US100_M5
discovery_sizing: fixed_lot
taxonomy:
  - ProjectGoal
  - Mission
  - Initiative
  - Portfolio
  - Study
  - Batch
  - Job
  - Executable
  - Lineage
  - Decision
  - Repair
  - Release
component_protocols:
  - feature
  - label
  - model
  - calibration
  - selector
  - trade
  - lifecycle
  - risk
  - regime
  - macro
  - external_source
  - execution
  - synthesis
library_population_before_scientific_mission_allowed: false
project_goal:
  authority: OPERATING_DIRECTION.md
  at_most_one_active_terminal_bounded_mission: true
  completion_outcome: completed_pre_live_handoff
  negative_terminal_requires_exact_successor: true
  blocker_waits_for_exact_external_change: true
  duplicate_trial_exposure_negative_memory_and_holdout_history_persist: true
  predecessor_candidate_claim_release_or_exhaustion_auto_promotion: false
research_direction:
  layers:
    - data_source
    - feature
    - label
    - model
    - objective
    - calibration
    - selector
    - trade
    - lifecycle
    - risk
    - regime
    - execution
    - synthesis
    - portfolio
  mission_intake:
    required_before_first_initiative: true
    exact_journal_head_bound: true
    required_review_surfaces:
      - executable_components
      - mission_terminals
      - negative_memory
      - portfolio_decisions
      - study_kpi
      - study_questions
      - validator_evidence
    minimum_competing_bottleneck_hypotheses: 2
    kpi_role: navigation_projection_only
    legacy_missing_tags: legacy_unclassified
    history_summary_source: writer_derived_durable_index
  axis:
    primary_research_layer_required: true
    system_architecture_family_required: true
    changed_and_controlled_domains_required: true
    non_synthesis_changed_domain_count: 1
    synthesis_or_portfolio_requires_multiple_changed_domains: true
    why_now_and_stop_or_reopen_condition_required: true
    identity_immutable_within_mission: true
  study_diagnosis:
    required_after_every_real_study_close: true
    exact_close_batch_kpi_and_validator_basis_bound: true
    evidence_states:
      - absent_information
      - target_mismatch
      - model_capacity
      - calibration_selection
      - entry_policy
      - lifecycle_risk
      - execution_cost
      - stability_concentration
      - supported_requires_confirmation
      - not_identifiable
      - engineering_gap
    kpi_alone_is_authority: false
    engineering_gap_is_scientific_falsification: false
    writer_derives_allowed_actions_and_layers: true
    next_decision_must_follow_dispose_or_structurally_exit: true
  architecture_review:
    thresholds_preregistered_in_initial_portfolio: true
    exact_unreviewed_diagnosis_set_only: true
    conclusions:
      - change_research_layer
      - rotate_architecture
    scientific_evidence: false
    required_before_next_decision_when_triggered: true
  exhaustion_requires:
    - mechanism_family_diversity
    - primary_research_layer_diversity
    - system_architecture_family_diversity
    - validator_demonstrated_negative_depth
portfolio:
  broad_before_deep: true
  recent_positive_monopoly_allowed: false
  fixed_global_allocation_ratio: null
  material_decision_requires_structurally_diversifying_action: true
  axis_semantics_immutable_within_mission: true
  axis_and_option_order_is_not_identity: true
  active_study_or_batch_blocks_portfolio_mutation: true
  decision_batch_commitment_is_enforced_at_each_batch_open: true
  initial_snapshot_requires_active_initiative: true
  mission_preregisters_exhaustion_standard: true
  exhaustion_standard_is_immutable: true
  in_mission_exhaustion_standard_amendment_allowed: false
  audit_defect_routes_to_successor_standard: true
  minimum_terminal_evidence_modes:
    - causal_contrast
    - sensitivity_or_stress
    - cost_and_execution
  terminal_evidence_modes_are_validator_demonstrated_not_question_declared: true
  decisions:
    - preserve
    - prune
    - deepen
    - rotate
    - contrast
    - new_mechanism
    - complementary_sleeve
    - recombine
    - synthesize
batch:
  operator_selects_adaptive_bound: true
  frozen_before_evidence: true
  global_tiny_cap: null
  unique_executable_is_trial: true
  successful_identity_cache_hit_is_trial: false
  identical_failed_retry_without_change_allowed: false
  identity_binds_study_semantic_hash_not_display_handles: true
  study_binds_portfolio_snapshot_decision_action_and_axis_identity: true
study_kpi_projection:
  path: records/STUDY_KPI.md
  source_record_kind: study-kpi
  source_event: study_closed
  scientific_authority: false
  prospective_from_activation: true
  retroactive_kpi_inference_allowed: false
  historical_backfill:
    sponsor_authorized_once: true
    activation_operation_id: study-close-kpi-main-delivery-authority-v1
    source: complete_pre_activation_immutable_study_close_set
    original_authority_order_required: true
    original_close_time_and_outcome_required: true
    final_disposition_completion_required_when_present: true
    retrospective_best_selection_allowed: false
    old_close_event_rewrite_allowed: false
    engineering_failure_executable_source: exact_final_failed_job_evidence_subject
    engineering_failure_metrics: null_display
    source_or_unavailable_metrics: null_display
    single_writer_event: study_kpi_backfilled
    scientific_claim_delta: 0
    trial_delta: 0
    holdout_delta: 0
    next_action_change_allowed: false
    future_sequence_continues_after_backfill: true
  one_row_per_real_study_close: true
  sequence:
    source: global_study_kpi_event_stream
    format: zero_padded_decimal_6
  close_time:
    source: journal_event_occurred_at_utc
    display_timezone: Asia/Seoul
  representative_executable:
    final_validator_source: final_batch_disposition_driving_validator_stop_batch_completion
    no_final_validator_completion_source: writer_verified_disposed_batch_basis
    historical_engineering_failure_source: exact_final_failed_job_declaration
    non_performance_validator_completion_dash_allowed: true
    full_immutable_identity_in_record: true
    collision_checked_display_prefix: true
    display_prefix_initial_hex_length: 12
    display_prefix_extension_hex_step: 4
    existing_display_id_rewrite_allowed: false
    caller_metric_input_allowed: false
    caller_unavailable_reason_allowed: false
    retrospective_best_fill_allowed: false
    completed_batch_requires_kpi_eligible_final_stop_completion: true
    generic_runtime_or_engineering_completion_can_stop_batch: false
    no_final_validator_completion:
      completed_batch_allowed: false
      study_outcomes:
        - evidence_gap
        - not_evaluable
        - pruned
      unstarted_batch_outcomes:
        - not_evaluable
        - stopped_early
      started_batch_outcomes:
        budget_exhausted: exact_frozen_compute_wall_or_trial_bound
        stopped_early: explicit_typed_disposition
        not_evaluable: final_non_scientific_not_evaluable_failure
        engineering_failure: final_non_scientific_engineering_failure
    kpi_bearing_measurement_exact_bindings:
      - executable_id
      - job_id
      - job_hash
  metrics:
    net_profit: net_profit_micropoints
    profit_factor: median_fold_profit_factor_milli
    trades: trade_count
    drawdown_share: monthly_realized_exit_drawdown_share_of_gross_profit_ppm
  missing_invalid_censored_or_inapplicable_display: "-"
  missing_value_becomes_zero_or_pass: false
  outcome_source: typed_study_close_outcome
  outcome_display_alias_allowed: false
  candidate_or_winner_claim: false
executable_identity_binds:
  - ordered_component_identities
  - parameters
  - data_identity
  - split_identity
  - clock_identity
  - cost_identity
  - engine_identity
  - external_source_semantic_contracts
data:
  decision_uses_completed_bar: true
  feature_available_by_decision_required: true
  external_available_by_decision_required: true
  fold_isolation_required: true
  sequential_decisions_required: true
  observed_development_manifest: foundation/data_exposure.yaml
  prior_memory_manifest: foundation/prior_scientific_memory.yaml
  unregistered_material_alias_allowed: false
  current_registered_development_material_only: true
  post_holdout_material_requires_typed_project_goal_registration: true
  post_holdout_material_binds_verified_content_time_split_and_successor: true
  dynamic_material_must_match_current_required_successor: true
  display_or_caller_digest_cannot_reset_multiplicity: true
negative_memory:
  persists_across_successor_missions: true
  evidence_must_be_validator_derived_scientific_falsification: true
  stores_validator_demonstrated_evidence_modes: true
  mission_study_snapshot_and_axis_identity_bound: true
  evidence_reference_order_is_not_identity: true
  caller_equivalence_object_is_authority: false
restricted_confirmation:
  redesign_reclassifies_to_development: true
  reused_as_untouched_after_redesign: false
holdout:
  sealed_ingestion_may_expose_values: false
  one_time_permit_required_for_scientific_read: true
  reveal_replay_allowed: false
  retuning_after_reveal_allowed: false
  one_global_semantic_chain: true
  duplicate_root_allowed: false
  successor_must_be_later_and_name_disposed_predecessor: true
  post_reveal_work_latched_until_disposition: true
  dataset_identity_is_artifact_hash: true
  row_identity_is_artifact_and_size_derived: true
  split_identity_is_rows_time_and_predecessor_derived: true
  failed_evaluation_negative_memory_uses_original_trial_lineage: true
  failed_or_not_evaluable_candidate_cannot_refreeze_from_pre_reveal_evidence: true
  post_holdout_development_receipt_required_before_refreeze: true
  registration_runs_only_at_exact_successor_next_action: true
  successor_values_remain_sealed_during_development_registration: true
  candidate_trial_material_and_evidence_must_postdate_registration: true
  passed_holdout_candidate_disposition_requires_later_successor: true
  reveal_count_and_future_holdout_latch_persist_across_missions: true
external_source_states:
  context_only:
    performance_allowed: false
    scheduler_allowed: false
  historical_audited:
    performance_allowed: false
    scheduler_allowed: false
  runtime_eligible:
    source_permit_allowed: true
  suspended:
    new_source_permit_allowed: false
    dependent_sleeve_action: fail_closed
source_semantic_change_creates_new_identity: true
same_semantics_recertification_changes_trial: false
source_eligibility_receipt:
  typed_and_content_addressed: true
  historical_audit_fields_required: true
  local_runtime_retrieval_proof_required: true
  current_state_rechecked_at_batch_and_runtime_entry: true
  arbitrary_receipt_labels_allowed: false
terminals:
  completed_pre_live_handoff:
    candidate_bound_release_required: true
    completes_project_goal: true
  closed_no_candidate:
    closes_only_current_mission: true
    exact_predecessor_bound_successor_required: true
    credible_diverse_frontier_exhaustion_required: true
    final_snapshot_all_axes_pruned: false
    final_snapshot_all_axes_evidence_bound_disposition: true
    axis_disposition_record_required: true
    axis_disposition_actions:
      - preserve
      - replay
      - reopen
      - defer
      - retire_with_reason
    partial_positive_retirement_allowed: false
    scientific_exhaustion_requires_low_information_negative_depth: true
    terminal_requires_at_least_one_scientifically_exhausted_axis: true
    nonexhausted_disposition_carries_successor_condition: true
    stale_axis_meaning_reuse_allowed: false
    unresolved_candidate_eligible_evidence_allowed: false
    candidate_disposition_must_postdate_and_include_positive_completion: true
    preregistered_axis_study_family_and_evidence_mode_bounds_required: true
    evidence_mode_bounds_use_negative_memory_executed_modes: true
  blocked_external:
    operations_contract_required: true
    project_goal_remains_active: true
live_ready_allowed: false
scientific_adjudication_v2:
  prospective_activation_required: true
  validator_identity_binds_protocol_and_dependencies: true
  stages:
    discovery:
      purpose: frontier_mapping
      candidate_authority: false
      partial_positive_allowed: true
      confirmation_grade_conjunction_required: false
    confirmation:
      purpose: promotion_grade_claim_testing
      untouched_or_separately_permitted_material_required: true
      candidate_authority_requires_all_decisive_claims: true
  criterion_roles:
    - validity
    - component
    - multiplicity
    - risk_diagnostic
    - risk_gate
  criterion_states:
    - supported
    - contradicted
    - unresolved
    - invalid
    - diagnostic
  result_states:
    - not_evaluable
    - contradicted
    - unresolved
    - partial_positive
    - frontier
    - confirmed
  discovery_candidate_eligible: false
  invalid_or_missing_decisive_input: not_evaluable
  unrelated_claim_compensation_allowed: false
  monthly_drawdown_profile_b04_default_role: risk_diagnostic
  multiplicity:
    authority: preregistered_concurrent_family_only
    global_search_history_role: context_and_duplicate_detection_only
    raw_and_adjusted_values_preserved: true
    monte_carlo_point_and_upper_preserved: true
historical_scientific_correction:
  original_event_rewrite_allowed: false
  additive_claim_scoped_adjudication_required: true
  candidate_authority: false
  trial_or_holdout_delta: 0
  missing_uncertainty_evidence_opens_bounded_replay: true
job_science_separation:
  operational_outcomes:
    - success
    - failed
    - not_evaluable
  scientific_verdicts:
    - passed
    - failed
    - not_evaluable
  validator_result_independent_of_job_status: true
  operational_failure_scientific_falsification_allowed: false
forest_execution:
  shared_boundary_axes_may_run_as_one_preregistered_concurrent_family: true
  sequential_recency_monopoly_allowed: false
  generic_engine_preferred_over_temporal_study_module: true
  exact_common_calendar_required: true
  implicit_missing_day_zero_fill_allowed: false
