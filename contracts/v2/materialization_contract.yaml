schema: axiom_rift_v2_materialization_contract_v1
status: active
encoding: ascii_only
authority:
  claims: contracts/v2/claim_ladder.yaml
  identity: contracts/v2/identity_policy.yaml
entry_gate:
  required_stage: M
  minimum_claim: selected
  frozen_identity_bundle_required: true
  required_frozen_identities:
    - dataset
    - split_and_final_fit_boundary
    - feature_dag_and_order
    - preprocessing
    - model_and_objective
    - selector
    - trade_program
    - cost_and_symbol_spec
onnx_boundary:
  preferred_input: fixed_float32_feature_vector
  preferred_output: model_scores
  outside_model:
    - canonical_clock
    - causal_rolling_state
    - missing_or_stale_input_state
    - sequential_admission
    - position_state
    - execution
feature_contract:
  single_canonical_spec: true
  required_fields:
    - names
    - order
    - dtype
    - shape
    - normalization
    - warmup
    - missing_value_behavior
    - availability_semantics
    - feature_order_sha256
parity_order:
  - raw_input_fixture
  - python_feature_vs_mql_feature
  - python_model_vs_onnx_runtime_score
  - onnx_runtime_vs_ea_onnx_score
  - python_vs_native_ea_decision
  - entry_exit_and_position_lifecycle
  - native_ea_closed_bar_logic
  - native_ea_real_tick_execution
parity_policy:
  timestamp_and_direction: exact
  numeric_tolerances: preregistered
  missing_kpi_allowed: false
ea_policy:
  native_online_feature_and_signal_generation_required: true
  thin_ea: true
  reusable_mql_logic_location: src/axiom_rift/v2/mt5/include
  schedule_replay_claim_ceiling: execution_conformance_only
  compile_only_claim_ceiling: none
runtime_checks:
  - cold_start_and_warmup
  - duplicate_bar_protection
  - restart_and_state_recovery
  - missing_and_stale_inputs
  - model_load_failure
  - clock_and_dst_behavior
  - broker_symbol_specification
  - feature_order_hash_enforcement
  - missing_kpi_detection
isolated_nine_fold_mt5:
  rerun_during_M_by_default: false
  allowed_only_when:
    - recertifying_changed_execution_engine
    - recertifying_changed_signal_semantics
    - prior_partition_equivalence_invalid
claim_rules:
  onnx_file_exists_is_onnx_ready: false
  ea_compile_is_materialization_ready: false
  schedule_replay_is_native_runtime_authority: false
