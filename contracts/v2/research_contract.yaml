schema: axiom_rift_v2_research_contract_v1
status: active
encoding: ascii_only
authority:
  state_machine: contracts/v2/state_machine.yaml
  claims: contracts/v2/claim_ladder.yaml
  splits: contracts/v2/split_policy.yaml
  identity: contracts/v2/identity_policy.yaml
  operator: contracts/v2/operator_contract.yaml
  programs: configs/v2/program_registry.yaml
  hypothesis: contracts/v2/hypothesis_contract.yaml
  kpi: contracts/v2/kpi_policy.yaml
  sensitivity: contracts/v2/sensitivity_policy.yaml
  autonomy: contracts/v2/autonomy_contract.yaml
root_mission:
  failed_hypothesis_ends_mission: false
  multiple_hypothesis_cycles_allowed: true
  automatic_next_hypothesis_selection: true
  automatic_stage_continuation: true
  another_user_goal_required_for_internal_transition: false
  budget_frozen_on_open: true
  material_exhaustion_receipt_required: true
  mission_open_requires_emergency_ceiling: true
  rolling_research_windows: true
  concrete_seed_priorities_allowed: false
stages:
  H:
    role: preregister_hypothesis_batch_and_executable_identity
    claim_ceiling: none
    data_execution_allowed: false
    resolved_kpi_profile_required: true
    sensitivity_or_disable_reason_required: true
  S:
    role: causal_breadth_depth_or_synthesis_scout
    claim_ceiling: diagnostic_observation
    mt5_required: false
    candidate_or_economics_claim_allowed: false
    scout_anchor_ids:
      - V2D002
      - V2D005
      - V2D008
    anchor_policy: fixed_season_diverse_early_middle_recent_before_results
    parameter_discovery_role: validation_oos_only
    development_variant_paths_per_fold_max: 1
    development_driven_retuning_allowed: false
    modes:
      - breadth
      - depth
      - synthesis
  R:
    role: full_development_confirmation
    claim_ceiling: research_candidate
    folds: all_development_cv
    mt5_default: one_certified_aggregate_logic_and_one_certified_aggregate_tick
    fold_partition_requires_conformance_receipt: true
  P:
    role: promotion_grade_robustness_and_economics
    claim_ceiling: selected
    isolated_nine_fold_mt5_required: true
    holdout_access_requires_frozen_identity_and_permit: true
  M:
    role: frozen_onnx_ea_materialization_and_handoff
    claim_ceiling: pre_live_ready
    retuning_allowed: false
isolated_nine_fold_policy:
  allowed_reasons:
    - P_promotion
    - engine_recertification
    - partition_equivalence_failure
    - material_cross_fold_state_change
  forbidden_for:
    - H
    - S
    - routine_R_when_valid_conformance_receipt_exists
fold_boundary_purge:
  purge_bars: max_of_label_horizon_and_max_trade_horizon
  train_label_end_must_be_lte_train_end: true
  validation_label_end_must_be_lte_validation_end: true
  development_label_end_must_be_lte_development_end: true
  trade_entry_and_exit_must_be_inside_same_evaluated_segment: true
  cross_boundary_positions: exclude_not_force_close
  prior_segment_feature_warmup:
    allowed: true
    role: causal_input_state_only
    labels_or_fit_from_future_role_allowed: false
  non_allow_gap_crossing:
    feature_to_label_interval_allowed: false
    trade_lifecycle_allowed: false
causality:
  decision_uses_completed_bar_only: true
  entry_timing: next_bar_open
  feature_available_at_must_be_lte_decision_time: true
  external_available_at_must_be_lte_decision_time: true
  prefix_invariance_required: true
  completed_decision_append_invariance_required: true
  sequential_oos_selection_required: true
  forbidden:
    - same_day_future_ranking
    - full_day_top_k
    - future_candidate_count_dependence
    - test_or_holdout_calibration
    - development_variant_selection
    - development_driven_retuning
    - silent_external_forward_fill
novelty:
  semantic_name_is_evidence: false
  executable_hashes_required:
    - feature_dag
    - label_program
    - model_and_objective
    - selector
    - trade_program
  v1_alpha_evidence_inherited: false
  v1_duplicate_check_timing: after_v2_preregistration
program_semantics:
  registry: configs/v2/program_registry.yaml
  canonical_runner_count: 1
  stage_differences_are_data_scope_fold_count_evidence_strength_and_claim_ceiling: true
  synthetic_fixture_is_operational_evidence: false
  bootstrap_programs_are_fixture_only: true
  callable_program_kinds:
    - feature
    - label
    - model
    - calibration
    - selector
    - trade
    - sizing
    - portfolio_risk
  bounded_jit_registration_allowed: true
  arbitrary_yaml_import_allowed: false
scientific_origin:
  active_index: registries/v2/scientific/index.yaml
  active_research_map: registries/v2/scientific/research_map.yaml
  inherited_scientific_content_allowed: false
  engineering_provenance_may_choose_hypothesis: false
external_runtime_data:
  registry: registries/v2/runtime_data_eligibility.yaml
  historical_only_allowed: false
  runtime_conformance_receipt_required: true
  pending_source_blocks_unrelated_research: false
nested_parameter_discovery:
  policy: contracts/v2/sensitivity_policy.yaml
  config: configs/v2/sensitivity.yaml
  train_role: train_is
  sensitivity_role: validation_oos
  outer_evaluation_role: development_cv
  fold_specific_selection_rule_must_be_causal: true
  candidate_identity_includes_selection_rule_hash: true
  final_runtime_value_is_frozen_not_live_retuned: true
trial_accounting:
  every_unique_executable_variant_counts: true
  cache_hit_same_hash_counts_again: false
  incomplete_trial_ledger_blocks_research_candidate: true
  development_variant_result_may_select_candidate: false
  durable_family_history_must_match_before_execution: true
  duplicate_configuration_across_folds_counts_once: true
  configuration_fold_cells_count_separately: true
  scientific_result_hash_includes_runtime_duration: false
holdout:
  human_approval_required: false
  permit_issuer: single_state_writer
  candidate_freeze_commit_required: true
  origin_main_sync_required_before_reveal: true
  reveal_count_max: 1
  retuning_after_reveal: false
terminal_outcomes:
  - completed_pre_live_handoff
  - closed_no_candidate
  - blocked_external
  - stopped_by_user
broken_code:
  counts_as_hypothesis_evidence: false
  may_close_stage: false
  required_action: repair_same_scope_or_record_complete_external_blocker
