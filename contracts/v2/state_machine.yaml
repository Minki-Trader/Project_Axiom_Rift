schema: axiom_rift_v2_state_machine_v2
status: active
encoding: ascii_only
id_patterns:
  mission: '^AXIOM_ROOT_[0-9]{4}$'
  goal: '^V2G[0-9]{4}$'
  hypothesis: '^V2H[0-9]{4}$'
  scout: '^V2S[0-9]{4}$'
  confirmation: '^V2R[0-9]{4}$'
  promotion: '^V2P[0-9]{4}$'
  materialization: '^V2M[0-9]{4}$'
stage_order:
  - H
  - S
  - R
  - P
  - M
stage_claim_ceilings:
  H: none
  S: diagnostic_observation
  R: research_candidate
  P: selected
  M: pre_live_ready
allowed_transitions:
  bootstrap:
    - H
  H:
    - S
  S:
    - H
    - R
  R:
    - H
    - P
  P:
    - H
    - M
  M: []
stage_internal_routes:
  S:
    - repair_required
    - validation_sensitivity
    - validation_local_calibration
    - freeze_one_development_path_per_fold
    - scout_rejected
    - evidence_gap_to_distinct_H
    - scale_miss_to_distinct_H
    - route_to_R
  development_result_may_return_to_local_calibration: false
internal_goal_outcomes:
  - completed_internal_goal
  - closed_no_candidate
  - blocked_internal
  - stopped_internal
root_terminal_outcomes:
  - completed_pre_live_handoff
  - closed_no_candidate
  - blocked_external
  - stopped_by_user
mission_statuses:
  - ready
  - active
  - terminal_validation_pending
  - terminal_pending_push
  - terminal
root_mission_rules:
  one_user_goal_until_terminal: true
  failed_hypothesis_is_terminal: false
  internal_transition_requires_user_prompt: false
  internal_goal_close_may_set_root_terminal: false
  root_terminal_transition_requires_closeout_object: true
  ordinary_mutation_invalidates_git_checkpoint: true
  persisted_git_status_is_not_completion_authority: true
  terminal_effective_only_after_metadata_push_verification: true
  terminal_content_requires_fresh_bound_validation_receipt: true
  content_and_metadata_commit_paths_are_exact: true
  third_self_reference_commit_required: false
structured_action_kinds:
  - none
  - await_new_root_goal
  - open_goal
  - preregister_hypothesis
  - open_stage
  - declare_job
  - run_job
  - resume_job
  - record_evidence
  - record_hypothesis_disposition
  - close_goal
  - close_root_mission
  - validate_root_closeout
  - verify_git_closeout
  - repair
structured_action_required_fields:
  - kind
  - goal_id
  - stage
  - subject_id
  - job_kind
  - prerequisite_receipt_ids
  - summary
structured_action_conditional_fields:
  close_root_mission:
    - mission_id
    - terminal_outcome
    - basis_evidence_id
structured_action_guards:
  writer_owned: true
  control_revision_cas_required_for_execution: true
  operation_idempotency_key_required_for_execution: true
  workflow_dsl_allowed: false
ready_boundary:
  harness_status: ready
  scientific_root_id: null
  scientific_epoch_id: null
  next_action: await_new_root_goal
  first_hypothesis_generated: false
repair_is_stage_outcome: false
broken_code_is_hypothesis_evidence: false
