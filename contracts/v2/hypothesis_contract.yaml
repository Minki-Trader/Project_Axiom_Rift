schema: axiom_rift_v2_hypothesis_contract_v1
status: active
encoding: ascii_only
active_new_hypothesis_schema: axiom_rift_v2_hypothesis_v2
legacy_closed_schema:
  schema: axiom_rift_v2_hypothesis_v1
  allowed_identity: V2H0001
required_sections:
  - autonomy_batch
  - executable_programs
  - data
  - falsification
  - acceptance_profile
  - sensitivity_plan
  - trial_plan
  - routing
  - evidence_budget
hypothesis_types:
  - structural_batch
  - coupled_mechanism
  - synthesis_ablation
scientific_origin:
  required: v2_current
  active_epoch_match_required: true
  inherited_parent_allowed: false
  external_dependencies_require_runtime_eligibility: true
autonomy_batch:
  schema: axiom_rift_v2_hypothesis_batch_v1
  same_object_as_full_hypothesis: true
  identity_must_match_outer_hypothesis: true
  family_must_match_trial_plan: true
  numeric_knobs_must_match_sensitivity_plan: true
  local_calibration_rounds_must_match_trial_plan: true
  bundle_hashes_must_cover_initial_executable_configurations: true
  enabled_sensitivity_requires_exact_bundle_hash_match: true
  batch_only_preregistration_allowed: false
falsification:
  required_condition_lists:
    - scientific_reject_conditions
    - repair_conditions
    - scale_miss_conditions
routing:
  broken_execution: repair_same_scope
  scientific_reject: record_negative_memory_then_rotate
  scientific_survive: advance_by_stage_gate
  scientific_evidence_gap: close_without_negative_memory_then_preregister_distinct_H
  holdout_informed_redesign: forbidden
  repair_is_not_hypothesis_failure: true
  boundary_trend_is_not_family_refutation: true
  development_failure_allows_same_H_retuning: false
  holdout_influenced_redesign_allowed: false
  scout_modes:
    - breadth
    - depth
    - synthesis
  renamed_duplicate_allowed: false
  identical_executable_retry_allowed: false
  one_context_failure_may_refute_family: false
evidence_budget:
  scout_jobs_max: 1
  mt5_runs_max: 0
  holdout_reveals_max: 0
  configuration_and_cell_caps_must_match_trial_plan: true
  declared_job_timeout_seconds_range:
    minimum_exclusive: 30
    maximum_inclusive: 3600
acceptance_profile:
  frozen_before_results: true
  resolved_metric_rules_required: true
  exact_thresholds_required: true
  weighted_composite_score_allowed: false
  profile_hash_required: true
sensitivity_plan:
  enabled_when_safe_numeric_parameter_exists: true
  disabled_requires_reason: true
  policy_ref: contracts/v2/sensitivity_policy.yaml
  config_ref: configs/v2/sensitivity.yaml
  data_role_must_be: validation_oos
  development_variant_selection_allowed: false
  per_fold_selection_feasibility_required: true
  feasibility_fields:
    - causal_checks_required
    - unknown_cost_observation_count_max
    - evaluable_trade_count_min_per_fold
trial_plan:
  frozen_before_results: true
  unique_variant_cap_required: true
  evaluation_cell_cap_required: true
  family_id_required: true
  local_calibration_new_evaluations_per_outer_fold_max: 1
  local_candidate_set_including_bracket_max: 3
  durable_family_history_required: true
  required_history_fields:
    - family_trials_before
    - family_configuration_hashes_before
    - family_history_sha256_before
    - global_trials_before
    - global_configuration_hashes_before
    - global_history_sha256_before
claim_boundary:
  preregistration_is_evidence: false
  sensitivity_surface_is_candidate_claim: false
