schema: axiom_rift_v2_operator_contract_v1
status: active
encoding: ascii_only
authority:
  project: contracts/v2/project_contract.yaml
  state_machine: contracts/v2/state_machine.yaml
  validation: contracts/v2/validation_contract.yaml
  mission_defaults: configs/v2/mission.yaml
  git: configs/v2/git.yaml
  autonomy: contracts/v2/autonomy_contract.yaml
root_loop:
  user_goal_count: one_until_terminal
  internal_transition_requires_user_prompt: false
  failed_hypothesis_ends_root: false
  bounded_steps_with_durable_reentry: true
  background_daemon_required: false
  codex_selects_high_dimensional_research_actions: true
  harness_enforces_deterministic_guards: true
  reinforcement_goal_may_stop_before_scientific_root: true
  await_new_root_goal_is_valid_ready_boundary: true
state:
  single_writer: src/axiom_rift/v2/operations.py
  active_mutation_jobs_max: 1
  structured_next_action_required: true
  free_form_transition_injection_allowed: false
  compact_active_references_only: true
  ordinary_mutation_invalidates_git_checkpoint: true
  root_terminal_is_derived_from_remote_metadata: true
active_job:
  required_above_seconds: 30
  evidence_must_match_job_stage_inputs_and_outputs: true
  clear_without_matching_receipt: false
  resume_before_new_job: true
research_jobs:
  nested_sensitivity_is_one_declared_scout_job: true
  sensitivity_and_calibration_role: validation_oos
  development_selected_paths_per_fold_max: 1
  local_calibration_rounds_max: 1
  validator_may_execute_research_job: false
  nested_receipt_requires_trial_history_reconciliation: true
  nested_receipt_requires_full_validation_metric_surface: true
  bootstrap_programs_may_seed_future_H: false
  future_scheduler_uses_empty_v2_scientific_state: true
  runtime_data_eligibility_required_before_external_feature_use: true
validation:
  focused_batches_per_slice: 1
  repair_batches_per_slice: 1
  recheck_batches_per_slice: 1
  identical_success: cache_hit_without_budget
  identical_failure_retry: forbidden
git:
  milestones:
    - H_preregistration
    - evidence_stage_close
    - candidate_freeze
    - complete_blocker
    - root_terminal_close
  per_file_artifact_fold_or_micro_fix: forbidden
  declared_paths_only: true
  push_required: true
  remote_head_check_required: true
  scientific_validation_rerun_after_push_failure: false
  content_commit_then_metadata_commit: true
  metadata_commit_sha_stored_in_state: false
  metadata_push_verified_read_only: true
  persisted_synced_flag_is_completion_authority: false
blocker:
  required_fields:
    - root_cause
    - reproduction_command
    - failing_artifact
    - affected_claims
    - completed_safe_work
    - exact_resume_action
    - required_external_state
    - local_commit_if_push_failed
terminal:
  allowed:
    - completed_pre_live_handoff
    - closed_no_candidate
    - blocked_external
    - stopped_by_user
  success_semantics: current_machine_local_pre_live_bundle
  live_ready_allowed: false
  persisted_status_before_focused_validation: terminal_validation_pending
  persisted_status_before_remote_verification: terminal_pending_push
  completion_requires_effective_remote_verification: true
