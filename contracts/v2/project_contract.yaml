schema: axiom_rift_v2_project_contract_v1
status: active
encoding: ascii_only
authority:
  goal_spec: contracts/v2/goal_spec.md
  architecture: contracts/v2/architecture.yaml
  operator: contracts/v2/operator_contract.yaml
  autonomy: contracts/v2/autonomy_contract.yaml
  goal_spec_role: immutable_v2_build_and_philosophy_source
  operator_role: active_post_activation_root_mission_operation
mission:
  broker: FPMarkets
  symbol: US100
  timeframe: M5
  target_system_entries_per_eligible_day:
    min: 5
    max: 10
    applies_to: combined_system_after_exposure_netting
    role: target_not_quota
  drawdown_target: controlled_monthly_drawdown
  profitability_target: strong_after_native_spread_and_realistic_slippage
  terminal_scope: ea_onnx_reproducible_pre_live_handoff
  live_operation: out_of_scope
operation_mode:
  user_goal_count: one_until_root_terminal
  codex_session_role: single_logical_session
  ask_user_for_routine_decisions: false
  external_review_required: false
  human_intermediate_approval_required: false
  portable_deployment_required: false
  current_machine_only: true
  active_mutation_jobs_max: 1
inherited_invariants:
  early_research_sizing: fixed_lot
  equity_percent_sizing_phase: post_candidate_robustness_or_growth
  discovery_freedom_until_evidence_freeze: true
  failures_are_durable_assets: true
  claims_must_not_exceed_evidence: true
v1_boundary:
  role: legacy_reference_only
  active_v2_research_truth: false
  continue_c0144: false
  inherit_campaign_or_run_numbering: false
  inherit_hypotheses_or_priorities: false
  inherit_positive_or_negative_alpha: false
  inherit_candidates_or_material_exhaustion: false
  inherit_selected_runtime_onnx_or_readiness_claims: false
  allowed_uses:
    - causality_leakage_parity_and_execution_lessons
    - software_and_operational_failure_lessons
    - validation_cost_benchmarks
    - explicitly_audited_infrastructure_reuse
  reuse_contract: contracts/v2/identity_policy.yaml
research_reset:
  namespace: V2
  initial_hypothesis_state: empty
  active_scientific_index: registries/v2/control_state.yaml
  scientific_index_seed: registries/v2/scientific/index.yaml
  research_map_seed: registries/v2/scientific/research_map.yaml
  active_research_map_objects: registries/v2/objects
  inherited_scientific_content_allowed: false
  bootstrap_programs_may_seed_research: false
  v1_performance_may_choose_initial_hypothesis: false
  exact_legacy_duplicate_check_allowed_after_preregistration: true
project_scope:
  in_scope:
    - causal_research
    - data_and_macro_context
    - model_and_trade_program_discovery
    - mt5_execution_evidence
    - onnx_and_native_ea_materialization
    - pre_live_handoff
  out_of_scope:
    - live_trading
    - capital_deployment
    - production_vps_operation
    - live_monitoring
    - live_ready_authority
    - external_collaboration_platform
    - portable_installer
    - mandatory_pull_request_or_ci
git_authority:
  local_branch: main
  remote_target: origin/main
  push_required_at_preregistration: true
  push_required_at_evidence_closeout: true
  push_required_at_candidate_freeze: true
  push_required_at_terminal_closeout: true
  remote_head_verification_required: true
  ordinary_state_mutation_invalidates_checkpoint: true
  closeout_metadata_must_be_pushed: true
  terminal_status_is_derived_from_clean_remote_metadata: true
  force_push_allowed: false
claim_boundary:
  contract_is_evidence: false
  current_level_created: none
  live_ready_allowed: false
