schema: axiom_rift_v2_autonomy_contract_v1
status: active
encoding: ascii_only
scope: future_scientific_root_missions
ready_boundary:
  harness_status: ready
  scientific_root: null
  scientific_epoch: not_started
  next_action: await_new_root_goal
  real_research_allowed_during_reinforcement: false
scientific_origin:
  required: v2_current
  inherited_scientific_content_allowed: false
  engineering_provenance_may_seed_research: false
  active_surface_guard_required: true
active_scientific_paths:
  index: registries/v2/scientific/index.yaml
  research_map: registries/v2/scientific/research_map.yaml
  hypothesis_ledger: registries/v2/scientific/hypothesis_ledger.jsonl
  trial_ledger: registries/v2/scientific/trial_ledger.jsonl
  negative_memory_ledger: registries/v2/scientific/negative_memory_ledger.jsonl
  ingredient_ledger: registries/v2/scientific/ingredient_ledger.jsonl
  candidate_ledger: registries/v2/scientific/candidate_ledger.jsonl
scientific_index_role: empty_seed_manifest_copied_into_writer_state_on_future_open
runtime_data_registry: registries/v2/runtime_data_eligibility.yaml
research_map_states:
  - unseen
  - shallow
  - contextual
  - deepened
  - refuted
  - synthesis_ready
program_kinds:
  - feature
  - label
  - model
  - calibration
  - selector
  - trade
  - sizing
  - portfolio_risk
hypothesis_types:
  - structural_batch
  - coupled_mechanism
  - synthesis_ablation
scout_modes:
  - breadth
  - depth
  - synthesis
scheduler:
  concrete_seed_priorities_allowed: false
  rolling_windows_required: true
  emergency_ceiling_frozen_at_future_mission_open: true
  score_dimensions:
    - information_value
    - coverage_deficit
    - novelty
    - complementarity
    - executability
    - adjacency
    - trial_cost
    - negative_memory_conflict
anti_loop:
  renamed_duplicate_allowed: false
  identical_executable_retry_allowed: false
  identical_failed_retry_allowed: false
  repair_batches_per_slice_max: 1
  recheck_batches_per_slice_max: 1
  one_context_may_refute_family: false
sizing:
  H_S_initial_R: fixed_lot
  dynamic_sizing_requires_candidate_quality: true
  dynamic_sizing_may_rescue_failed_fixed_lot: false
  dynamic_sizing_freeze_required_before_P: true
  exact_rule_frozen_at_ready_boundary: false
runtime_data:
  historical_only_scientific_eligibility: false
  cached_conformance_receipt_required: true
  pending_source_blocks_unrelated_research: false
claim_boundary:
  harness_receipt_is_scientific_evidence: false
  runtime_authority_created: false
  live_ready_created: false
