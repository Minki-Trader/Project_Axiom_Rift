schema: axiom_rift_v2_identity_policy_v1
status: active
encoding: ascii_only
canonicalization:
  format: compact_sorted_ascii_json
  path_separator: '/'
  hash: sha256
object_store:
  root: registries/v2/objects
  write_once: true
  idempotent_same_content: true
control_state:
  path: registries/v2/control_state.yaml
  schema: axiom_rift_v2_control_state_v2
  mutable_authority_count: 1
  update: bounded_lock_cas_unique_temp_fsync_single_replace
  active_history: bounded_recent_references_only
  durable_history: immutable_objects_and_hash_chain_ledgers
  next_action: structured_writer_owned
ledgers:
  hypothesis: registries/v2/hypothesis_ledger.jsonl
  evidence: registries/v2/evidence_ledger.jsonl
  material: registries/v2/material_ledger.jsonl
  validation_receipt: registries/v2/validation_receipts.jsonl
ledger_rules:
  append_only: true
  sequence_starts_at: 1
  hash_chain: true
  existing_row_mutation: false
  duplicate_content_policy: reject_without_consuming_namespace
reconciliation:
  orphan_ledger_or_object_detection_required: true
  automatic_destructive_repair_allowed: false
legacy_reuse_required_fields:
  - source_path
  - decision
  - deficiency
  - parity_boundary
  - rollback_boundary
research_variant_identity:
  layers:
    executable_configuration:
      - executable_program_payload
      - resolved_numeric_parameters
    fold_evaluation:
      - executable_configuration_hash
      - data_role
      - split_ids
    selected_path:
      - fold_evaluation_hash
      - selection_rule_hash
      - selected_model_bundle_hash
  candidate_identity_includes_calibration_rule_hash: true
  fold_selected_parameter_and_bundle_hash_required: true
  semantic_rename_resets_family_trial_count: false
  executable_configuration_hash_excludes:
    - hypothesis_id
    - fold_id
    - runtime_duration
  executable_configuration_hash_includes:
    - executable_program_payload
    - resolved_numeric_parameters
  durable_family_history_hash_required: true
  durable_global_history_hash_required: true
