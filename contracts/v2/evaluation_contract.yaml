schema: axiom_rift_v2_evaluation_contract_v1
status: active
encoding: ascii_only
authority:
  project: contracts/v2/project_contract.yaml
  claims: contracts/v2/claim_ladder.yaml
  splits: contracts/v2/split_policy.yaml
  kpi_policy: contracts/v2/kpi_policy.yaml
cost_policy:
  commission_per_trade: 0
  synthetic_commission_allowed: false
  spread_source: broker_native_or_verified_snapshot
  spread_stress_allowed: true
  slippage_stress_allowed: true
  zero_spread_observation:
    verified_cost_free_interpretation_allowed: false
    default_status: unknown_cost
    diagnostic_gross_metrics_allowed: true
    after_cost_metrics_allowed: false
    blocks_claims:
      - research_candidate
      - robustness_candidate
      - economics_pass
      - selected
    resolution_requires:
      - verified_tradable_zero_spread_receipt
      - or_predeclared_conservative_nonzero_cost_profile
data_field_eligibility:
  real_volume:
    eligible_for_feature_label_filter_or_regime: false
    reason: fpmarkets_us100_real_volume_is_zero_or_non_authoritative
  tick_volume:
    eligible: true
    requires_dataset_identity: true
  spread:
    eligible: true
    unit: broker_points
    conversion_requires_symbol_point_size: true
sizing:
  H_S_R: fixed_lot
  P: fixed_lot_primary_with_separate_growth_analysis_allowed
  M: frozen_runtime_rule_required
  equity_sizing_may_rescue_weak_signal: false
activity_kpi:
  denominator: all_eligible_market_days
  required:
    - eligible_day_count
    - entry_count
    - entries_per_eligible_day
    - zero_entry_day_rate
    - daily_entry_count_p10
    - daily_entry_count_median
    - daily_entry_count_p90
    - maximum_daily_entries
    - single_direction_share
    - session_concentration
    - regime_concentration
  daily_cap_role: safety_cap_not_quota
  five_to_ten_target_level: combined_system_after_exposure_netting
  single_sleeve_five_to_ten_hard_gate: false
economics_kpi:
  required_by_P:
    - net_broker_points
    - profit_factor
    - expectancy_broker_points
    - monthly_maximum_drawdown_broker_points
    - time_under_water
    - turnover
    - exposure_concentration
    - cost_stress
    - fold_and_regime_stability
metric_namespace:
  canonical_units: broker_points
  canonical:
    direction_concentration: single_direction_share
    net_points_after_cost: net_broker_points
    profit_factor_after_cost: profit_factor
    expectancy_after_cost: expectancy_broker_points
    monthly_drawdown: monthly_maximum_drawdown_broker_points
  semantic_aliases_are_executable_names: false
  hypothesis_profiles_use_canonical_values: true
gate_policy:
  aggregation: non_compensatory_precedence
  weighted_composite_score_allowed: false
  acceptance_profile_frozen_before_results: true
  exact_thresholds_live_in_acceptance_profile: true
  aggregate_result_is_not_robustness_evidence: true
  development_cv_is_not_final_oos: true
  trial_counts_required:
    - total_trials
    - family_trials
    - candidate_selections
    - holdout_reveals
metric_availability:
  policy: contracts/v2/kpi_policy.yaml
  missing_or_invalid: repair_not_hypothesis_failure
  censored: never_auto_pass
  not_evaluable: scientific_nonpass
  not_scheduled_or_not_applicable: no_current_claim_basis
special_cases:
  zero_trade_drawdown:
    numeric_value: null
    state: not_evaluable
  zero_loss_profit_factor:
    numeric_value: null
    state: censored
  direction_or_session_concentration:
    compare_to_preregistered_design_intent: true
  partial_unknown_cost:
    after_cost_metric_state: not_evaluable
    route: evidence_gap
claim_boundary:
  contract_is_evidence: false
  economics_pass_created: false
