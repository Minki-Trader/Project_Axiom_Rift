schema: evidence_contract
status: active
depths:
  - discovery
  - confirmation
  - execution_proof
  - materialization
  - release
depth_is_per_executable: true
outputs:
  durable_evidence:
    content_addressed: true
    durable_manifest_required: true
    research_input_snapshot:
      unique_declared_evidence_identities: true
      each_declared_evidence_identity_read_verified_exactly_once: true
      missing_identity_or_hash_error_fails_closed: true
      only_verified_noncanonical_or_unrelated_artifacts_may_be_skipped: true
      exactly_one_artifact_per_requested_schema_role: true
      surface_manifest_binds_exact_surface_artifact_hash: true
      surface_manifest_binds_expected_output_implementation_sha256: true
      output_implementation_binding_is_exact_prior_job_producer_authority: false
      future_prior_output_reuse_requires_typed_exact_producer_route: true
      unused_prior_output_producer_framework_is_prebuilt: false
      private_store_root_is_not_a_consumer_capability: true
      running_job_evidence_facade_methods: [finalize, read_verified]
      prospective_source_admission_rejects_raw_store_import_construction_and_reflection: true
      historical_raw_store_compatibility_prospective_reuse_allowed: false
  reproducible_cache:
    claim_authority: false
    eviction_allowed: true
    local_presence_required_for_scientific_or_terminal_credit: false
    rematerialization_requires_exact_durable_producer_trace_and_hash: true
    producer_identity_binds_exact_declaration_start_permit_entry_and_completion: true
    later_same_work_fingerprint_attempt_may_substitute: false
  transient:
    delete_at_job_close: true
    allowed_root: local/jobs
  local_output_hash_verified_before_close: true
running_job_context_capability:
  validated_scalar_fields: [prior_global_multiplicity_floor]
  broad_repository_or_index_path_exposed: false
  stable_control_or_index_view_exposed: false
  fixed_hold_projection_binds_verified_execution_study_batch_and_subject: true
  source_state_projection_binds_verified_source_contract: true
  frozen_historical_source_registry_is_prospective_authority: false
  StateWriter_or_raw_EvidenceStore_is_prospective_engine_authority: false
claims:
  subject_bound: true
  candidate_and_release_require_candidate_bound_evidence: true
  missing_invalid_or_censored_kpi_auto_pass: false
  dimensions_are_non_compensatory: true
  release_artifact_must_be_referenced_job_durable_output: true
  release_coverage_is_writer_derived_from_runtime_job_completions: true
  source_lifecycle_claim_is_exact_source_component_surface_and_case_bound: true
  source_lifecycle_release_credit_requires_complete_writer_derived_matrix: true
research_interpretation:
  study_diagnosis:
    scientific_evidence: false
    exact_writer_derived_evidence_basis_required: true
    caller_kpi_or_failure_prose_is_authority: false
  architecture_review:
    scientific_evidence: false
    scheduler_and_identifiability_decision_only: true
validators:
  current_surface_only: true
  may_build_data: false
  may_train: false
  may_compile: false
  may_export_onnx: false
  may_run_mt5: false
  may_download_inputs: false
  routine_full_history_scan: false
  routine_full_test_suite_required: false
  unchanged_success_reused: true
  unchanged_failure_blind_retry: false
  production_registry_default_empty: true
  identity_binds_protocol_domains_and_implementation_hash: true
  actual_class_module_validate_and_preflight_source_must_match_declared_implementation: true
  project_local_import_closure_is_sealed_registration_integrity: true
