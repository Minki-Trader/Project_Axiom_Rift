  result_manifest_is_a_declared_validator_artifact: true
  artifact_hash_rechecked_after_validator_returns: true
  scientific_evidence_modes_are_validator_derived: true
  caller_verdict_or_facts_are_authority: false
  runtime_source_lifecycle_coverage_ids_are_validator_derived: true
  engineering_scientific_source_runtime_and_external_domains_are_typed: true
  engineering_retry_validation:
