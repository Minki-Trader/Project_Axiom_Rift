schema: evidence_contract
status: active
depths:
  - discovery
  - confirmation
  - execution_proof
  - materialization
  - release
depth_is_per_executable: true
outputs:
  durable_evidence:
    content_addressed: true
    durable_manifest_required: true
  reproducible_cache:
    claim_authority: false
    eviction_allowed: true
    local_presence_required_for_scientific_or_terminal_credit: false
    rematerialization_requires_exact_durable_producer_trace_and_hash: true
    producer_identity_binds_exact_declaration_start_permit_entry_and_completion: true
    later_same_work_fingerprint_attempt_may_substitute: false
  transient:
    delete_at_job_close: true
    allowed_root: local/jobs
  local_output_hash_verified_before_close: true
claims:
  subject_bound: true
  candidate_and_release_require_candidate_bound_evidence: true
  missing_invalid_or_censored_kpi_auto_pass: false
  dimensions_are_non_compensatory: true
  release_artifact_must_be_referenced_job_durable_output: true
  release_coverage_is_writer_derived_from_runtime_job_completions: true
research_interpretation:
  study_diagnosis:
    scientific_evidence: false
    exact_writer_derived_evidence_basis_required: true
    caller_kpi_or_failure_prose_is_authority: false
  architecture_review:
    scientific_evidence: false
    scheduler_and_identifiability_decision_only: true
validators:
  current_surface_only: true
  may_build_data: false
  may_train: false
  may_compile: false
  may_export_onnx: false
  may_run_mt5: false
  may_download_inputs: false
  routine_full_history_scan: false
  routine_full_test_suite_required: false
  unchanged_success_reused: true
  unchanged_failure_blind_retry: false
  production_registry_default_empty: true
  identity_binds_protocol_domains_and_implementation_hash: true
  canonical_request_is_deeply_immutable: true
  every_declared_durable_artifact_must_be_read: true
  result_manifest_is_a_declared_validator_artifact: true
  artifact_hash_rechecked_after_validator_returns: true
  scientific_evidence_modes_are_validator_derived: true
  caller_verdict_or_facts_are_authority: false
  scientific_source_runtime_and_external_domains_are_typed: true
engineering_fixture:
  scientific_eligible: false
  scheduler_eligible: false
  candidate_eligible: false
  trial_delta: 0
  holdout_delta: 0
  scientific_claim: none
  real_git_worktree_target_allowed: false
scientific_adjudication_v2:
  plan_measurement_and_result_are_exact_bound_artifacts: true
  validator_dependency_hashes_are_identity: true
  criterion_roles_are_preregistered: true
  component_dimensions_are_non_compensatory: true
  invalid_unresolved_and_diagnostic_are_not_failed: true
  only_exact_contradiction_is_scientific_failure: true
  discovery_candidate_eligible: false
  confirmation_candidate_requires_all_decisive_gates: true
  project_history_fields_in_multiplicity_artifact_allowed: false
  concurrent_family_raw_and_adjusted_pvalues_recomputed: true
historical_adjudication:
  original_evidence_hashes_required: true
  exact_completion_and_study_close_required: true
  legacy_completion_without_rich_v2_only: true
  interpretation_recomputed_by_writer: true
  profile_is_writer_derived_fixed_legacy_v1: true
  caller_multiplicity_or_risk_profile_authority: false
  validity_overrides_are_writer_derived_from_durable_source_latches: true
  validity_override_supersession_is_union_monotone: true
  additive_qualification_only: true
  candidate_trial_and_holdout_delta: 0
axis_disposition:
  additive_and_portfolio_snapshot_preserving: true
  audit_only_scope_is_completion_bound_not_axis_wide: true
  historical_adjudication_cannot_restore_overlayed_credit: true
  source_replacement_lineage_is_additive_and_snapshot_preserving: true
  source_replacement_lineage_is_authority_disposition_not_scientific_evidence: true
  retired_invalidated_axis_scientific_or_terminal_credit: false
  exact_evidence_references_required: true
  effective_state_and_candidate_eligibility_writer_derived: true
  partial_invalid_unresolved_and_low_information_preserved: true
  scientific_exhaustion_requires_exact_negative_depth: true
  candidate_trial_holdout_and_claim_delta: 0
project_goal_audit_v2_evidence:
  mode_authority:
    caller_label_is_capability: false
    cache_presence_is_capability: false
    prior_verdict_is_capability: false
    registered_protocol_recomputation_required: true
    durable_subject_bound_proof_required: true
    audit_integrity:
      only_effective_mode: audit_integrity
      scientific_credit: false
      terminal_or_exhaustion_credit: false
      economic_candidate_or_release_authority: false
  atomic_scientific_proof:
    exact_bundle:
      - validation_plan
      - atomic_support
      - statistical_proof
      - execution_trace
      - result_manifest
    every_artifact_content_addressed_and_opened: true
    summary_metric_without_atomic_support_allowed: false
    cached_point_value_without_recomputation_allowed: false
    support_binds:
      - protocol_identity
      - data_identity
      - split_identity
      - executable_identity
    statistical_proof_binds:
      - exact_concurrent_family
      - method
      - seed
      - resample_count
      - alpha
      - raw_statistic
      - adjusted_statistic
      - monte_carlo_uncertainty
    execution_trace_binds:
      - decision_time
      - entry_time
      - exit_time
      - fold
      - regime
      - intent
      - gross_pnl
      - native_cost
      - stress_cost
      - native_net_pnl
      - stress_net_pnl
      - result_attribution
    recomputation_must_match_declared_result: true
    decision_day_and_exit_day_attribution_explicit: true
  adjudication:
    comparison_state_and_scientific_state_are_distinct: true
    terminal_and_scheduler_use_scientific_state_only: true
  historical_scope_overlay:
    additive_only: true
    original_completion_rewrite_allowed: false
    exact_completion_and_executable_bound: true
    effective_modes_replace_mistaken_credit_for_readers: true
    audit_integrity_overlay_scientific_credit: false
    audit_integrity_overlay_terminal_credit: false
    applies_to_scheduler_axis_and_exhaustion_readers: true
  economic_composite_proof:
    component_summary_bundle_allowed: false
    actual_trade_rows_required: true
    member_identity_and_exposure_netting_required: true
    entry_and_exit_timing_required: true
    native_and_stressed_costs_required: true
    portfolio_drawdown_attribution_required: true
