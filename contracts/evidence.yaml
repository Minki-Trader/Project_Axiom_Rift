    registered_validator_is_executed_not_caller_asserted: true
    exact_writer_derived_surface_inventory_required: true
    old_and_new_manifest_and_every_artifact_byte_opened: true
    generic_python_path_requires_exact_source_closure_manifest: true
    source_closure_must_explain_every_outer_artifact_hash: true
    relative_path_role_inventory_must_be_identical: true
    measurement_binds_each_changed_path_to_exact_old_and_new_hash: true
    validator_parses_changed_source_bytes_not_closure_json: true
    canonical_python_ast_is_independently_derived: true
    canonical_ast_equality_alone_is_equivalence_authority: false
    every_python_path_requires_constant_only_source_independent_scan_for_generic_pass: true
    source_file_bytes_identity_context_import_call_io_or_reflection_observable_fails_closed: true
    caller_authored_old_new_observations_are_authority: false
    hash_set_pairing_without_path_roles_is_authority: false
    path_swap_and_missing_duplicate_or_ambiguous_path_coverage_fail_closed: true
    plan_result_and_every_measurement_are_content_addressed_and_opened: true
    result_verdict_and_surface_coverage_are_recomputed: true
    immutable_registry_trace_is_persisted: true
    passed_claims_equal_complete_surface_inventory: true
    engineering_evidence_has_scientific_candidate_or_release_credit: false
