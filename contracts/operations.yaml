    behavior_change_requires_protocol_specific_validator_or_new_scientific_identity: true
    exact_old_new_identity_claim_and_registry_trace_bound: true
    passed_full_surface_coverage_only: true
    scientific_candidate_and_release_eligibility: false
    caller_scientific_semantics_changed_false_is_authority: false
    missing_failed_not_evaluable_partial_or_self_authored_only_close_allowed: false
    rejection_preserves_requires_scientific_change_disposition: true
    engineering_fixture_and_non_implementation_paths_preserved: true
