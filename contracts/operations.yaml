schema: operations_contract
status: active
authority:
  operating_direction: OPERATING_DIRECTION.md
  mutable_control: state/control.json
  durable_journal:
    legacy_path: records/journal.jsonl
    segmented_manifest: records/journal/manifest.json
    resolver: axiom_rift.storage.journal.DurableJournal
    offset_mode: global_virtual
    dual_read_compatibility: true
  local_projection: local/index.sqlite
  single_writer: axiom_rift.operations.writer.StateWriter
transaction:
  order:
    - finalize_content_addressed_evidence
    - append_fsync_idempotent_journal_event
    - materialize_staged_authority_files_if_migration
    - atomic_cursor_compare_and_swap
    - advance_local_index_projection
  journal_is_authority: true
  index_is_reconstructible: true
  reject_future_cursor_or_index: true
  recover_trailing_cursor_or_index: true
  projection_guard_binds_exact_record_digest_chain: true
read_only_engine_boundary:
  control_and_journal_construction_creates_directories: false
  reader_may_create_or_initialize_writer_lock: false
  local_index_open_mode: sqlite_mode_ro_query_only
  current_schema_required_without_reader_migration: true
  missing_index_creation_allowed: false
  reader_side_journal_wal_or_shm_creation_allowed: false
  exposed_index_capability_has_mutation_methods: false
  engine_snapshot:
    existing_writer_lock_required: true
    every_decoded_projection_record_rejoins_exact_journal_authority: true
  workflow_projection_reads:
    sqlite_read_only_capability_required: true
    direct_read_write_local_index_open_allowed: false
    stable_head_guard_remains_decision_authority: true
journal_storage:
  schema: journal_manifest_v1
  sealed_segment_schema: journal_segment_seal_v1
  active_segment_count: 1
  sealed_segments_immutable: true
  sealed_segment_sha256_required: true
  manifest_changes_only_on_rotation: true
  segment_byte_limit: 33554432
  segment_event_limit: 5000
  event_may_cross_segment_boundary: false
  event_max_bytes: 1048576
  legacy_event_bytes_rewritten_on_migration: false
  existing_global_offsets_preserved: true
  existing_event_ids_preserved: true
  rotation_under_single_writer_lock: true
  interrupted_rotation_requires_recovery_before_append: true
  unreferenced_segment_allowed: false
authority_migration:
  journal_first: true
  content_addressed_replacement_bytes_required: true
  exact_bound_paths_and_old_new_hashes_required: true
  crash_recovery_materializes_pending_files_before_control: true
  scientific_trial_holdout_and_claim_delta: 0
  local_main_correction_delivery:
    authority_changing_code_checkpoint_remains_unpublished_before_apply: true
    origin_main_is_strict_ancestor_of_local_head: true
    divergent_or_non_ancestor_origin_allowed: false
    clean_git_index_required: true
    head_control_and_journal_equal_origin_baseline: true
    head_authority_bytes_equal_exact_reviewed_replacements: true
    worktree_change_is_none_or_exact_resumable_correction_suffix: true
    correction_state_uses_a_second_local_commit: true
    both_commits_delivered_by_one_non_force_fast_forward_push: true
    force_push_allowed: false
    correction_journal_event_upper_bound: 2
    segmented_journal_headroom_uses_max_event_bytes: true
    resumable_headroom_subtracts_exact_head_suffix_events: true
    insufficient_segment_headroom_blocks_before_correction_mutation: true
    segmented_rollover_during_this_one_off_correction_allowed: false
goal_ingress:
  persistent_project_goal_authority: OPERATING_DIRECTION.md
  bare_or_one_line_goal_allowed: true
  user_structured_manifest_required: false
  active_mission_action: resume
  bare_boundary_action: open_first_mission
  bare_boundary_requires_absent_mission_history: true
  negative_terminal_boundary_action: open_exact_predecessor_bound_successor
  predecessor_link_derived_and_verified_by_writer: true
  at_most_one_active_mission: true
  project_goal_completion_terminal: completed_pre_live_handoff
research_direction:
  first_initiative_requires_mission_research_intake: true
  intake_binds_exact_current_journal_head: true
  intake_event: research_intake_recorded
  intake_record_kind: research-intake
  initial_portfolio_binds_intake: true
  exact_stage_actions:
    - record_research_intake
    - build_portfolio
    - portfolio_decision
    - execute_portfolio_decision
    - review_study_continuation
    - diagnose_study
    - review_architecture
  study_close_order:
    - study_closed
    - local_main_checkpoint_and_initial_push_attempt
    - study_diagnosis_recorded
    - optional_architecture_review_recorded
    - portfolio_decision
  pending_diagnosis_or_architecture_review_blocks_initiative_close: true
  pending_direction_blocks_candidate_freeze_and_exhaustion: true
  diagnosis_and_review_are_study_close_delivery_guarded: true
  writer_derives_history_summary_and_followup_constraints: true
  architecture_review_trigger:
    threshold_preregistered_in_initial_portfolio: true
    exact_unreviewed_diagnosis_set_bound: true
    required_before_later_scientific_mutation: true
  study_continuation:
    action: review_study_continuation
    record_kind: study-continuation-decision
    event: study_continuation_reviewed
    only_after_exact_intermediate_batch_close: true
    exact_single_next_action_required: true
    continue_action: freeze_batch
    close_action: judge_study
    later_batch_open_requires_current_continue_record_and_exact_batch_id: true
    commitment_bound_excess_allowed: false
    judge_study_bypass_allowed: false
active_state:
  historical_arrays_allowed: false
  one_exact_next_action: true
  one_active_parent_job: true
  active_job_workers_require_disjoint_claims: true
  post_holdout_successor_registration_is_latched: true
  negative_terminal_carries_exact_successor_boundary: true
  project_goal_history_is_not_control_array_state: true
  completed_project_goal_is_an_exact_latched_terminal_boundary: true
job:
  required:
    - immutable_job_identity
    - command_or_callable_identity
    - implementation_content_identity
    - input_hashes
    - frozen_budget
    - expected_outputs
    - output_classes
    - log_path
    - timeout_or_stop_rule
    - resume_action
    - evidence_subject
  resume_existing_before_new: true
  input_hashes_are_sorted_and_unique: true
  duplicate_input_identity_inflation_allowed: false
  identity_and_attempt_stream_are_mission_bound: true
  success_cache_binds_expected_outputs_and_storage_classes: true
  success_cache_reuse_reverifies_every_output_hash_and_availability: true
  reproducible_cache_reuse_requires_present_exact_bytes: true
  missing_reproducible_cache_may_be_rematerialized: true
  rematerialization_is_not_job_success_cache_reuse: true
  rematerialization_requires_exact_durable_producer_completion_trace_manifest_and_hash: true
  rematerialization_is_atomic_and_consumer_initiated: true
  present_reproducible_cache_hash_mismatch_fails_closed: true
  study_close_credit_requires_local_reproducible_cache_presence: false
  study_close_reverifies_exact_durable_producer_and_consumer_traces: true
  producer_lookup_starts_from_exact_manifest_execution_and_declaration: true
  producer_start_permit_consumption_engine_entry_and_completion_rejoined: true
  later_same_work_fingerprint_attempt_may_substitute: false
  transient_output_success_is_not_reusable: true
  logical_output_namespace:
    spelling: normalized_relative_ascii_posix
    backslash_drive_colon_dot_empty_and_parent_components_allowed: false
    windows_reserved_components_allowed: false
    case_insensitive_aliases_allowed: false
    durable_evidence_roots: [evidence, scientific, source]
    reproducible_cache_root: local/cache
    transient_output_and_log_root: local/jobs
    completion_must_repeat_the_exact_declared_names_and_classes: true
  worker_claim_namespace:
    worker_input_and_resource_claims: portable_nonempty_ascii_logical_identifiers
    worker_ids_inputs_outputs_and_resources_are_casefold_unique: true
    worker_output_claims_are_internal_work_shard_labels: true
    worker_output_claims_are_expected_output_file_names: false
  repeated_success_cache_observation_creates_no_duplicate_record: true
  success_cache_observation_is_read_only_and_preserves_next_action: true
  every_implementation_identity_is_canonical_content_addressed_evidence: true
  implementation_evidence_binds_callable_protocol_and_artifact_hashes: true
  implementation_artifact_hashes_are_sorted_and_unique: true
  prospective_job_source_authority:
    every_subject_kind_is_covered: true
    checked_at_declaration_and_start: true
    one_exact_typed_source_closure_required: true
    source_paths_are_normalized_relative_link_free_and_confined_to_current_src: true
    durable_artifact_bytes_must_equal_current_path_bytes: true
    callable_identity_derives_exact_module_path_and_defined_function: true
    source_closure_plus_separately_verified_component_artifacts_explains_manifest: true
    path_relabel_hash_swap_or_post_declaration_byte_drift_fails_closed: true
    production_historical_replay_or_fixture_exemption_allowed: false
    historical_completion_remains_read_only_evidence: true
    external_observed_development_prefix:
      manifest_and_source_closure_are_bidirectionally_bound: true
      exact_source_key_material_prefix_and_loader_required: true
      job_builder_derives_sorted_input_hashes_before_declaration: true
      writer_silently_adds_missing_input_hashes: false
      quarantined_raw_parent_is_not_a_routine_job_input: true
      declaration_verifies_physical_prefix_identity_once: true
      start_and_cached_success_reuse_reverify_physical_prefix_identity: true
      identity_scan_checks_link_path_regular_inode_device_mode_size_mtime_hash_rows_and_times: true
      numeric_ohlc_and_volume_parse_is_deferred_to_the_execution_loader: true
      missing_drifted_or_link_swapped_prefix_fails_closed: true
  failed_attempt_equivalence_ignores_budget_and_timeout_changes: true
  failed_retry_requires_a_changed_typed_basis: true
  retry_family:
    schema: job_retry_family.v1
    writer_derived_from_control_subject_and_typed_work_lane: true
    arbitrary_input_hashes_change_exact_work_but_not_retry_family: true
    declaration_and_completion_project_one_atomic_family_stream: true
    current_failed_family_head_required: true
    caller_omission_of_retry_proof_bypasses_family_guard: false
    legacy_reconstruction:
      only_when_family_stream_is_absent: true
      indexed_current_mission_job_declarations_only: true
      batch_bound_family_prefers_exact_indexed_batch_slice: true
      global_job_or_completion_history_scan_allowed: false
      stored_spec_rederives_family: true
      exact_work_attempt_head_required: true
      latest_journal_authority_sequence_governs: true
      latest_success_supersedes_older_failure: true
      malformed_or_ambiguous_history_fails_closed: true
  implementation_retry:
    schema: job_changed_cause.v1
    actual_implementation_artifact_set_must_change: true
    semantic_and_scientific_input_change_allowed: false
    exact_prior_engineering_failure_required: true
    registered_engineering_validator_required: true
    validation_plan_and_every_result_artifact_must_be_opened: true
    cause_resolved_and_material_change_are_validator_derived: true
    caller_passed_method_explanation_or_byte_change_is_authority: false
    deterministic_retry_basis_created_and_consumed_with_job_declaration: true
    retry_basis_binds_consuming_job_id_and_hash: true
    retry_basis_reuse_or_collision_allowed: false
  same_implementation_retry:
    schema: job_retry_resume_authority.v1
    allowed_changed_dimensions: [cause, information, compute_budget]
    exact_prior_completion_failure_disposition_and_resume_condition_bound: true
    changed_basis_and_independent_verification_evidence_required: true
    registered_engineering_validator_required: true
    validation_plan_and_every_result_artifact_must_be_opened: true
    caller_verdict_or_verification_method_is_authority: false
    exact_validator_facts_and_registry_trace_persisted: true
    deterministic_retry_basis_consumed_with_same_job_declaration_event: true
    production_registry_default_empty_and_fail_closed: true
    feasible_repair_requires_narrow_validator_not_family_abandonment: true
    validator_absence_or_failure_is_scientific_failure: false
    operational_resolution_evidence_is_not_a_job_input: true
    scientific_semantics_changed: false
    repeated_family_dimension_and_basis_allowed: false
    requires_scientific_change_disposition_allowed: false
    runtime_source_resolution:
      caller_proof_required: false
      exact_prior_runtime_source_ineligibility_bound: true
      writer_derived_fresh_runtime_eligible_source_head_required: true
      unchanged_job_specification_required: true
      stale_or_repeated_source_state_allowed: false
    compute_budget_reestimate:
      compute_and_wall_fields_only: true
      trial_and_stop_budget_unchanged: true
      prior_reservations_are_not_refunded: true
      cumulative_original_frozen_batch_ceiling_required: true
  one_shot_job_permit_consumed_at_start: true
  runtime_bound:
    preregister_action_depth_and_claim_surfaces: true
    executable_subject_required: true
    durable_evidence_output_required: true
    job_and_runtime_permits_revalidated_together: true
    runtime_permit_binds_job_candidate_activation_and_depth: true
