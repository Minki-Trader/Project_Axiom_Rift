schema: operations_contract
status: active
authority:
  operating_direction: OPERATING_DIRECTION.md
  mutable_control: state/control.json
  durable_journal:
    legacy_path: records/journal.jsonl
    segmented_manifest: records/journal/manifest.json
    resolver: axiom_rift.storage.journal.DurableJournal
    offset_mode: global_virtual
    dual_read_compatibility: true
  local_projection: local/index.sqlite
  single_writer: axiom_rift.operations.writer.StateWriter
transaction:
  order:
    - finalize_content_addressed_evidence
    - append_fsync_idempotent_journal_event
    - materialize_staged_authority_files_if_migration
    - atomic_cursor_compare_and_swap
    - advance_local_index_projection
  journal_is_authority: true
  index_is_reconstructible: true
  reject_future_cursor_or_index: true
  recover_trailing_cursor_or_index: true
  projection_guard_binds_exact_record_digest_chain: true
journal_storage:
  schema: journal_manifest_v1
  sealed_segment_schema: journal_segment_seal_v1
  active_segment_count: 1
  sealed_segments_immutable: true
  sealed_segment_sha256_required: true
  manifest_changes_only_on_rotation: true
  segment_byte_limit: 33554432
  segment_event_limit: 5000
  event_may_cross_segment_boundary: false
  event_max_bytes: 1048576
  legacy_event_bytes_rewritten_on_migration: false
  existing_global_offsets_preserved: true
  existing_event_ids_preserved: true
  rotation_under_single_writer_lock: true
  interrupted_rotation_requires_recovery_before_append: true
  unreferenced_segment_allowed: false
authority_migration:
  journal_first: true
  content_addressed_replacement_bytes_required: true
  exact_bound_paths_and_old_new_hashes_required: true
  crash_recovery_materializes_pending_files_before_control: true
  scientific_trial_holdout_and_claim_delta: 0
goal_ingress:
  persistent_project_goal_authority: OPERATING_DIRECTION.md
  bare_or_one_line_goal_allowed: true
  user_structured_manifest_required: false
  active_mission_action: resume
  bare_boundary_action: open_first_mission
  bare_boundary_requires_absent_mission_history: true
  negative_terminal_boundary_action: open_exact_predecessor_bound_successor
  predecessor_link_derived_and_verified_by_writer: true
  at_most_one_active_mission: true
  project_goal_completion_terminal: completed_pre_live_handoff
research_direction:
  first_initiative_requires_mission_research_intake: true
  intake_binds_exact_current_journal_head: true
  intake_event: research_intake_recorded
  intake_record_kind: research-intake
  initial_portfolio_binds_intake: true
  exact_stage_actions:
    - record_research_intake
    - build_portfolio
    - portfolio_decision
    - execute_portfolio_decision
    - diagnose_study
    - review_architecture
  study_close_order:
    - study_closed
    - local_main_checkpoint_and_initial_push_attempt
    - study_diagnosis_recorded
    - optional_architecture_review_recorded
    - portfolio_decision
  pending_diagnosis_or_architecture_review_blocks_initiative_close: true
  pending_direction_blocks_candidate_freeze_and_exhaustion: true
  diagnosis_and_review_are_study_close_delivery_guarded: true
  writer_derives_history_summary_and_followup_constraints: true
  architecture_review_trigger:
    threshold_preregistered_in_initial_portfolio: true
    exact_unreviewed_diagnosis_set_bound: true
    required_before_later_scientific_mutation: true
active_state:
  historical_arrays_allowed: false
  one_exact_next_action: true
  one_active_parent_job: true
  active_job_workers_require_disjoint_claims: true
  post_holdout_successor_registration_is_latched: true
  negative_terminal_carries_exact_successor_boundary: true
  project_goal_history_is_not_control_array_state: true
  completed_project_goal_is_an_exact_latched_terminal_boundary: true
job:
  required:
    - immutable_job_identity
    - command_or_callable_identity
    - implementation_content_identity
    - input_hashes
    - frozen_budget
    - expected_outputs
    - output_classes
    - log_path
    - timeout_or_stop_rule
    - resume_action
    - evidence_subject
  resume_existing_before_new: true
  identity_and_attempt_stream_are_mission_bound: true
  success_cache_binds_expected_outputs_and_storage_classes: true
  success_cache_reuse_reverifies_every_output_hash_and_availability: true
  reproducible_cache_reuse_requires_present_exact_bytes: true
  missing_reproducible_cache_may_be_rematerialized: true
  rematerialization_is_not_job_success_cache_reuse: true
  rematerialization_requires_exact_durable_producer_completion_trace_manifest_and_hash: true
  rematerialization_is_atomic_and_consumer_initiated: true
  present_reproducible_cache_hash_mismatch_fails_closed: true
  study_close_credit_requires_local_reproducible_cache_presence: false
  study_close_reverifies_exact_durable_producer_and_consumer_traces: true
  producer_lookup_starts_from_exact_manifest_execution_and_declaration: true
  producer_start_permit_consumption_engine_entry_and_completion_rejoined: true
  later_same_work_fingerprint_attempt_may_substitute: false
  transient_output_success_is_not_reusable: true
  repeated_success_cache_observation_creates_no_duplicate_record: true
  success_cache_observation_is_read_only_and_preserves_next_action: true
  every_implementation_identity_is_canonical_content_addressed_evidence: true
  implementation_evidence_binds_callable_protocol_and_artifact_hashes: true
  implementation_artifact_hashes_are_sorted_and_unique: true
  failed_attempt_equivalence_ignores_budget_and_timeout_changes: true
  failed_retry_requires_a_different_implementation_artifact_set: true
  one_shot_job_permit_consumed_at_start: true
  runtime_bound:
    preregister_action_depth_and_claim_surfaces: true
    executable_subject_required: true
    durable_evidence_output_required: true
    job_and_runtime_permits_revalidated_together: true
    runtime_permit_binds_job_candidate_activation_and_depth: true
repair:
  scientific_identity_frozen: true
  scientific_trial_delta: 0
  scientific_failure_delta: 0
  required:
    - cause
    - minimum_reproduction
    - changed_cause_proof
    - interrupted_action
    - exact_resume_action
  semantic_change_becomes_new_executable: true
permit_matrix:
  source: [Study, Executable]
  study: [Initiative]
  batch: [Study]
  job: [Job]
  repair: [Job]
  runtime: [Executable]
  holdout: [Executable]
  release: [Release]
  engine_revalidation_required: true
  revoke_path_required: true
job_failure:
  writer_computes_failure_signature: true
  minimum_reproduction_evidence_required: true
  root_cause_required: true
  interrupted_action_required: true
  exact_declared_resume_action_required: true
  changed_cause_manifest:
    prior_failure_signature_required: true
    changed_dimension: implementation
    previous_and_new_implementation_identity_required: true
    new_implementation_identity_is_canonical_manifest_hash: true
    implementation_manifest_binds_callable_protocol_and_artifact_hashes: true
    every_referenced_implementation_artifact_is_content_addressed: true
    arbitrary_or_reused_blob_allowed: false
terminal_basis:
  completed_pre_live_handoff: frozen_candidate_bound_release
  frozen_positive_basis_withdrawal: release_disposed_invalidated_only
  closed_no_candidate: accepted_diverse_frontier_exhaustion_audit
  blocked_external: complete_external_blocker_record
terminal_scope:
  completed_pre_live_handoff_completes_project_goal: true
  closed_no_candidate_closes_only_current_mission: true
  closed_no_candidate_requires_exact_successor_admission: true
  blocked_external_keeps_project_goal_active_and_waits: true
blocker:
  external_cause_required: true
  typed_recovery_plan:
    exact_stable_boundary_event_required: true
    boundary_event_participates_in_plan_identity: true
    validation_plan_content_addressed_and_reverified: true
    ordered_paths_required: true
    required_path_kinds:
      - external_probe
      - local_recovery
      - safe_substitute_search
    continuation_keeps_one_plan_identity: true
    recurrent_outage_requires_new_current_boundary_plan: true
    stale_boundary_plan_allowed: false
  standalone_external_judgement_required_before_next_job: true
  external_evidence_grants_scientific_candidate_or_release_credit: false
  judgement:
    failed_with_all_blocker_predicates_advances_only_to_next_frozen_path: true
    failed_without_blocker_predicates_restores_exact_mission_action: true
    final_failed_path_may_propose_blocker: true
    passed_restores_exact_mission_action: true
    not_evaluable_restores_exact_mission_action: true
    not_evaluable_has_blocker_credit: false
  safe_substitute_absent_required: true
  recovery_paths_exhausted_required: true
  exact_external_change_required: true
  exact_resume_action_required: true
  registered_external_validator_required: true
  caller_failure_manifest_is_authority: false
  validator_derived_indispensability_required: true
  validator_derived_no_contract_valid_next_action_required: true
  blocked_mission_capability_required: true
  blocker_record_requires_every_ordered_failed_judgement: true
  portfolio_snapshot_required_for_blocked_external: false
  close_preserves_typed_resume_condition_and_action: true
  reentry:
    same_mission_required: true
    exact_wait_boundary_required: true
    exact_validator_derived_passed_change_required: true
    fresh_mission_authorization_epoch_required: true
    successor_mission_created: false
    scientific_trial_claim_and_holdout_delta: 0
    repeated_operation_id_is_idempotent: true
    resume_action_requires_exact_action_specific_schema: true
    canonical_nested_ascii_json_bindings_allowed: true
    canonical_binding_name_order_required: true
    exact_recovery_plan_payload_round_trip_required: true
    lossy_scalar_coercion_allowed: false
    restored_action_must_equal_frozen_action: true
