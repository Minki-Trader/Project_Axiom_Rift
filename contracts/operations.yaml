schema: operations_contract
status: active
authority:
  operating_direction: OPERATING_DIRECTION.md
  mutable_control: state/control.json
  durable_journal:
    legacy_path: records/journal.jsonl
    segmented_manifest: records/journal/manifest.json
    resolver: axiom_rift.storage.journal.DurableJournal
    offset_mode: global_virtual
    dual_read_compatibility: true
  local_projection: local/index.sqlite
  single_writer: axiom_rift.operations.writer.StateWriter
transaction:
  order:
    - finalize_content_addressed_evidence
    - append_fsync_idempotent_journal_event
    - materialize_staged_authority_files_if_migration
    - atomic_cursor_compare_and_swap
    - advance_local_index_projection
  journal_is_authority: true
  index_is_reconstructible: true
  reject_future_cursor_or_index: true
  recover_trailing_cursor_or_index: true
  projection_guard_binds_exact_record_digest_chain: true
journal_storage:
  schema: journal_manifest_v1
  sealed_segment_schema: journal_segment_seal_v1
  active_segment_count: 1
  sealed_segments_immutable: true
  sealed_segment_sha256_required: true
  manifest_changes_only_on_rotation: true
  segment_byte_limit: 33554432
  segment_event_limit: 5000
  event_may_cross_segment_boundary: false
  event_max_bytes: 1048576
  legacy_event_bytes_rewritten_on_migration: false
  existing_global_offsets_preserved: true
  existing_event_ids_preserved: true
  rotation_under_single_writer_lock: true
  interrupted_rotation_requires_recovery_before_append: true
  unreferenced_segment_allowed: false
authority_migration:
  journal_first: true
  content_addressed_replacement_bytes_required: true
  exact_bound_paths_and_old_new_hashes_required: true
  crash_recovery_materializes_pending_files_before_control: true
  scientific_trial_holdout_and_claim_delta: 0
goal_ingress:
  persistent_project_goal_authority: OPERATING_DIRECTION.md
  bare_or_one_line_goal_allowed: true
  user_structured_manifest_required: false
  active_mission_action: resume
  bare_boundary_action: open_first_mission
  bare_boundary_requires_absent_mission_history: true
  negative_terminal_boundary_action: open_exact_predecessor_bound_successor
  predecessor_link_derived_and_verified_by_writer: true
  at_most_one_active_mission: true
  project_goal_completion_terminal: completed_pre_live_handoff
research_direction:
  first_initiative_requires_mission_research_intake: true
  intake_binds_exact_current_journal_head: true
  intake_event: research_intake_recorded
  intake_record_kind: research-intake
  initial_portfolio_binds_intake: true
  exact_stage_actions:
    - record_research_intake
    - build_portfolio
    - portfolio_decision
    - execute_portfolio_decision
    - diagnose_study
    - review_architecture
  study_close_order:
    - study_closed
    - local_main_checkpoint_and_initial_push_attempt
    - study_diagnosis_recorded
    - optional_architecture_review_recorded
    - portfolio_decision
  pending_diagnosis_or_architecture_review_blocks_initiative_close: true
  pending_direction_blocks_candidate_freeze_and_exhaustion: true
  diagnosis_and_review_are_study_close_delivery_guarded: true
  writer_derives_history_summary_and_followup_constraints: true
  architecture_review_trigger:
    threshold_preregistered_in_initial_portfolio: true
    exact_unreviewed_diagnosis_set_bound: true
    required_before_later_scientific_mutation: true
active_state:
  historical_arrays_allowed: false
  one_exact_next_action: true
  one_active_parent_job: true
  active_job_workers_require_disjoint_claims: true
  post_holdout_successor_registration_is_latched: true
  negative_terminal_carries_exact_successor_boundary: true
  project_goal_history_is_not_control_array_state: true
  completed_project_goal_is_an_exact_latched_terminal_boundary: true
job:
  required:
    - immutable_job_identity
    - command_or_callable_identity
    - implementation_content_identity
    - input_hashes
    - frozen_budget
    - expected_outputs
    - output_classes
    - log_path
    - timeout_or_stop_rule
    - resume_action
    - evidence_subject
  resume_existing_before_new: true
  identity_and_attempt_stream_are_mission_bound: true
  success_cache_binds_expected_outputs_and_storage_classes: true
  success_cache_reuse_reverifies_every_output_hash_and_availability: true
  reproducible_cache_reuse_requires_present_exact_bytes: true
  transient_output_success_is_not_reusable: true
  repeated_success_cache_observation_creates_no_duplicate_record: true
  success_cache_observation_is_read_only_and_preserves_next_action: true
  every_implementation_identity_is_canonical_content_addressed_evidence: true
  implementation_evidence_binds_callable_protocol_and_artifact_hashes: true
  implementation_artifact_hashes_are_sorted_and_unique: true
  failed_attempt_equivalence_ignores_budget_and_timeout_changes: true
  failed_retry_requires_a_different_implementation_artifact_set: true
  one_shot_job_permit_consumed_at_start: true
  runtime_bound:
    preregister_action_depth_and_claim_surfaces: true
    executable_subject_required: true
    durable_evidence_output_required: true
    job_and_runtime_permits_revalidated_together: true
    runtime_permit_binds_job_candidate_activation_and_depth: true
repair:
  scientific_identity_frozen: true
  scientific_trial_delta: 0
  scientific_failure_delta: 0
  required:
    - cause
    - minimum_reproduction
    - changed_cause_proof
    - interrupted_action
    - exact_resume_action
  semantic_change_becomes_new_executable: true
permit_matrix:
  source: [Study, Executable]
  study: [Initiative]
  batch: [Study]
  job: [Job]
  repair: [Job]
  runtime: [Executable]
  holdout: [Executable]
  release: [Release]
  engine_revalidation_required: true
  revoke_path_required: true
job_failure:
  writer_computes_failure_signature: true
  minimum_reproduction_evidence_required: true
  root_cause_required: true
  interrupted_action_required: true
  exact_declared_resume_action_required: true
  changed_cause_manifest:
    prior_failure_signature_required: true
    changed_dimension: implementation
    previous_and_new_implementation_identity_required: true
    new_implementation_identity_is_canonical_manifest_hash: true
    implementation_manifest_binds_callable_protocol_and_artifact_hashes: true
    every_referenced_implementation_artifact_is_content_addressed: true
    arbitrary_or_reused_blob_allowed: false
terminal_basis:
  completed_pre_live_handoff: frozen_candidate_bound_release
  frozen_positive_basis_withdrawal: release_disposed_invalidated_only
  closed_no_candidate: accepted_diverse_frontier_exhaustion_audit
  blocked_external: complete_external_blocker_record
terminal_scope:
  completed_pre_live_handoff_completes_project_goal: true
  closed_no_candidate_closes_only_current_mission: true
  closed_no_candidate_requires_exact_successor_admission: true
  blocked_external_keeps_project_goal_active_and_waits: true
blocker:
  external_cause_required: true
  safe_substitute_absent_required: true
  recovery_paths_exhausted_required: true
  exact_external_change_required: true
  exact_resume_action_required: true
  registered_external_validator_required: true
  caller_failure_manifest_is_authority: false
  validator_derived_indispensability_required: true
  validator_derived_no_contract_valid_next_action_required: true
  blocked_mission_capability_required: true
git:
  scientific_authority: false
  coherent_milestones_only: true
  final_delivery_requires_origin_main_same_tree: true
  study_close_checkpoint:
    trigger_event: study_closed
    applies_to_engineering_fixture: false
    classification: coherent_milestone
    kpi_record_kind: study-kpi
    kpi_projection: records/STUDY_KPI.md
    local_commit_and_initial_push_attempt_required_before_later_scientific_work: true
    remote_equality_required_before_later_scientific_work: false
    required_same_commit_paths:
      - state/control.json
      - records/STUDY_KPI.md
    required_journal_path:
      legacy: records/journal.jsonl
      segmented: manifest_active_segment
      rotation_additional:
        - records/journal/manifest.json
        - just_sealed_segment_seal
        - new_active_segment
    local_ref: main
    remote_ref: origin/main
    one_commit_per_study_close: true
    separate_batch_job_fold_or_kpi_commit_allowed: false
    exact_path_staging_required: true
    unrelated_staging_allowed: false
    commit_trailers:
      - Axiom-Study-Close
      - Axiom-State-Revision
    automated_enforcement:
      tracked_commit_msg_hook: .githooks/commit-msg
      required_core_hooks_path: .githooks
      validator: scripts/validate_study_close_commit.py
      full_audit: scripts/audit_all_study_close_deliveries.py
      staged_state_journal_and_kpi_required_together: true
      deterministic_staged_kpi_rerender_required: true
      exact_contiguous_final_trailer_block_required: true
      hook_bypass_allowed: false
      next_portfolio_decision_writer_guard_required: true
      missing_or_malformed_delivery_blocks_later_scientific_mutation: true
    boot_delivery_audit:
      basis: prospective_study_kpi_records_and_exact_commit_trailers
      exact_unique_trailer_commit_reachable_from_local_ref: true
      commit_changes_all_required_same_commit_paths: true
      commit_snapshot_journal_tail_matches_event: true
      commit_snapshot_control_head_matches_event_and_revision: true
      commit_snapshot_kpi_projection_equals_deterministic_journal_render: true
      local_commit_absence_requires_resume_before_state_or_science_action: true
      refresh_remote_tracking_ref_before_observation: true
      remote_relation: closeout_commit_ancestor_of_remote_ref
      remote_absence_requires_immediate_push_attempt: true
    push_mode: non_force
    remote_tree_equality_observed_read_only: true
    push_failure:
      rolls_back_scientific_close: false
      changes_claim_or_next_action: false
      external_blocker_by_itself: false
      valid_science_may_continue_after_failed_attempt: true
      retry_same_commit: true
      retry_at_next_stable_delivery_opportunity: true
      duplicate_closeout_commit_allowed: false
  study_close_delivery_repair_checkpoint:
    sponsor_authorization_required: true
    applies_to: prospective_study_close_commit_missing_only_required_trailers
    applies_once_per_exact_listed_commit: true
    original_commit_requirements:
      reachable_from_local_main: true
      ancestor_of_origin_main: true
      changes_all_required_same_commit_paths: true
      snapshot_journal_tail_matches_close_event_and_revision: true
      snapshot_control_head_matches_close_event_and_revision: true
      snapshot_kpi_projection_equals_deterministic_journal_render: true
      scientific_or_projection_content_may_differ: false
    attestation_manifest: records/STUDY_CLOSE_DELIVERY_REPAIR.json
    manifest_binds:
      - original_commit
      - original_tree
      - study_close_event_id
      - state_revision
      - control_blob
      - journal_blob
      - study_kpi_blob
    scientific_state_delta: 0
    verdict_claim_trial_holdout_kpi_or_next_action_delta: 0
    history_rewrite_allowed: false
    duplicate_study_close_snapshot_allowed: false
    commit_trailers:
      - Axiom-Study-Close-Delivery-Repair
      - Axiom-State-Revision
    boot_delivery_audit_accepts_valid_attested_original: true
    push_mode: non_force
    remote_tree_equality_observed_read_only: true
  study_kpi_historical_backfill_checkpoint:
    trigger_event: study_kpi_backfilled
    applies_once: true
    activation_operation_id: study-close-kpi-main-delivery-authority-v1
    source: complete_pre_activation_immutable_study_close_set
    classification: coherent_milestone
    one_commit_for_complete_history: true
    per_historical_study_commit_allowed: false
    old_history_rewrite_allowed: false
    required_same_commit_paths:
      - state/control.json
      - records/STUDY_KPI.md
    required_journal_path: resolved_snapshot_active_segment
    local_ref: main
    remote_ref: origin/main
    exact_path_staging_required: true
    unrelated_staging_allowed: false
    commit_trailers:
      - Axiom-Study-KPI-Backfill
      - Axiom-State-Revision
    push_mode: non_force
    remote_tree_equality_observed_read_only: true
    push_failure:
      rolls_back_backfill_authority: false
      changes_claim_trial_holdout_or_next_action: false
      retry_same_commit: true
      duplicate_backfill_commit_allowed: false
  prohibited:
    - force_push
    - hard_reset
    - history_rewrite
    - unrelated_staging
    - cleanup_outside_verified_allowlist
project_goal_audit_correction:
  authority_migration_is_single_writer_only: true
  historical_state_rewrite_allowed: false
  accepted_unstarted_decision_withdrawal_requires_exact_basis_and_evidence: true
  source_authority_invalidation_is_additive_and_latched: true
  prospective_protocol_rebinds_after_later_authority_migration: true
job_result_semantics:
  operational_success_requires_declared_outputs_and_validation: true
  scientific_verdict_is_independent: true
  scientific_falsification_as_operational_failure_allowed: false
  legacy_failed_scientific_completion_remains_readable: true
  negative_memory_uses_validator_verdict: true
source_authority_audit:
  exact_active_source_head_bound: true
  canonical_audit_manifest_and_report_provenance_required: true
  unrelated_artifact_reuse_allowed: false
  prior_legitimate_receipt_preserved: true
  audit_invalidation_may_not_impersonate_job_completion: true
  ordinary_same_semantics_recertification_clears_latch: false
  resolution_policy_required: true
  current_point_in_time_defect_resolution: new_source_contract
research_protocol:
  stream: research-protocol:scientific
  supported: scientific_adjudication_v2
  current_authority_manifest_bound: true
  latest_valid_stream_head_is_active: true
  authority_migration_requires_additive_rebinding_before_scientific_job: true
  same_authority_duplicate_activation_allowed: false
  trial_holdout_and_candidate_delta: 0
mission_axis_disposition:
  single_writer_route: record_axis_dispositions
  portfolio_snapshot_rewrite_allowed: false
  accepted_evidence_kinds:
    - job-completed
    - historical-scientific-adjudication
    - negative-memory
  writer_rederives_state_and_candidate_eligibility: true
  actions:
    - preserve
    - replay
    - reopen
    - defer
    - retire_with_reason
  partial_positive_retirement_allowed: false
  low_information_retirement_requires_negative_memory: true
  exact_latest_disposition_required_for_terminal: true
  terminal_requires_at_least_one_scientifically_exhausted_axis: true
  unresolved_candidate_eligible_positive_blocks_terminal: true
  trial_holdout_candidate_and_claim_delta: 0
validation_economics:
  routine_study_close_delivery_basis: tamper_evident_high_water_and_new_suffix
  complete_history_scan: explicit_maintenance_only
  sealed_segment_hash_cache: process_shared_bounded_by_identity
  current_kind_counts: materialized_projection
  routine_cost_may_grow_with_history: false
study_close_delivery_checkpoint:
  tracked_checkpoint: records/STUDY_CLOSE_DELIVERY_CHECKPOINT.json
  schema: study_close_delivery_checkpoint.v1
  git_authenticated_high_water: true
  ignored_local_cache_role: non_authoritative_hint_only
  routine_validation_reads: checkpoint_boundary_and_bounded_suffix
  routine_active_segment_prefix_rehash_required: false
  missing_local_cache_forces_full_audit: false
  initialization_requires_explicit_complete_history_audit: true
  initialization_commit_trailers:
    - Axiom-Study-Close-Checkpoint
    - Axiom-State-Revision
  prospective_close_advances_checkpoint_in_same_commit: true
  prospective_required_same_commit_paths:
    - state/control.json
    - records/STUDY_KPI.md
    - resolved_journal_paths
    - records/STUDY_CLOSE_DELIVERY_CHECKPOINT.json
  omitted_modified_or_malformed_checkpoint_blocks_later_science: true
  no_op_guard_rewrites_local_projection: false
