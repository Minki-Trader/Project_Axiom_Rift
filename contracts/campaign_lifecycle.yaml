schema: axiom_rift_campaign_lifecycle_contract_v1
status: draft_active
encoding: ascii_only

purpose: define numbered campaign and synthesis operation for Axiom discovery work without creating selected, runtime, promotion, or live claims

allowed_use:
  - create numbered campaign folders under campaigns/
  - create numbered synthesis folders under campaigns/ after synthesis readiness checks
  - organize one major campaign hypothesis into multiple run variants
  - organize post-campaign synthesis from prior campaign ingredients without treating it as a child run
  - require every run to declare model, feature, trade_logic, and label surfaces
  - record proxy evidence, mt5 probe attempt evidence, parity results, repair notes, and gate results
  - close runs and campaigns from evidence without selecting a final model, feature set, label, or trade shape

forbidden_use:
  - use stage terminology as canonical Axiom lifecycle language
  - use frontier_extra terminology as canonical Axiom lifecycle language
  - nest synthesis folders inside a numbered campaign folder
  - treat adjacent tuning as a new run variant
  - disguise run repair or micro tuning as campaign-level exploration
  - use GitHub Issues, worktrees, PR automation, MCP, or external memory as active truth
  - place raw data or processed reusable datasets inside campaign folders
  - create selected model, selected feature set, selected label, runtime authority, ONNX, promotion, economics, or live readiness claims

required_fields:
  campaign:
    - campaign_id
    - campaign_slug
    - status
    - hypothesis.summary
    - hypothesis.boundary
    - required_surfaces
    - opened_at_utc
    - claim_boundary
  synthesis:
    - synthesis_id
    - synthesis_slug
    - status
    - source_campaign_ids
    - synthesis_level
    - synthesis_question.summary
    - synthesis_question.boundary
    - ingredient_refs_path
    - synthesis_queue_path
    - opened_at_utc
    - claim_boundary
  run:
    - work_unit_id
    - parent_type
    - run_id
    - status
    - hypothesis_variant.summary
    - hypothesis_variant.variant_boundary
    - surfaces
    - proxy_plan
    - mt5_probe_plan
    - proxy_vs_mt5_plan
    - evidence_paths
    - repair.hypothesis_repair_count
    - gate_status
    - claim_boundary
  synthesis_run:
    - work_unit_id
    - parent_type
    - run_id
    - status
    - source_ingredient_ids
    - surfaces
    - proxy_plan
    - mt5_probe_plan
    - proxy_vs_mt5_plan
    - evidence_paths
    - gate_status
    - claim_boundary
  repair:
    - repair_id
    - repair_type
    - parent_run_id
    - reason
    - changed_surfaces
    - evidence_paths
    - counts_toward_hypothesis_repair_limit
  parity:
    - parity_id
    - parent_run_id
    - mechanical_parity_status
    - intent_parity_status
    - mismatch_summary
    - repair_required
    - evidence_paths
  gate_report:
    - gate_report_id
    - work_unit_id
    - run_id
    - evidence_gate
    - parity_gate
    - claim_gate
    - decision
    - next_action
    - evidence_paths
    - claim_boundary
  closeout:
    - status
    - close_reason
    - evidence_paths
    - remaining_question
    - claim_boundary

identity:
  campaign_id_format: C0001
  campaign_folder_format: campaigns/C0001_short_slug
  run_id_format: R0001
  run_folder_format: campaigns/C0001_short_slug/runs/R0001
  synthesis_id_format: SC0001
  synthesis_folder_format: campaigns/SC0001_short_slug
  synthesis_run_id_format: SR0001
  synthesis_run_folder_format: campaigns/SC0001_short_slug/runs/SR0001
  repair_id_format: RP0001
  parity_id_format: P0001

campaign_policy:
  campaign_has_one_major_hypothesis: true
  campaign_must_cover_all_surfaces: true
  required_surfaces:
    - model
    - feature
    - trade_logic
    - label
  campaign_is_not:
    - stage
    - selected_baseline
    - model_promotion
    - runtime_authority
    - live_readiness
  closeout_must_include_synthesis_due_check: true

synthesis_policy:
  synthesis_is_top_level_work_unit: true
  synthesis_folder_must_be_sibling_of_campaign_folders: true
  synthesis_folder_must_not_be_nested_under_campaign: true
  synthesis_is_not_campaign_replacement: true
  synthesis_opens_after:
    - accumulated_closed_campaign_evidence
    - synthesis_readiness_check_open_synthesis
  stream_examples:
    campaign_stream:
      - C0001
      - C0002
      - C0003
      - C0004
    synthesis_stream:
      - SC0001
      - SC0002
  synthesis_levels:
    synthesis_2: combine_two_ingredient_groups
    synthesis_3: combine_three_ingredient_groups
    synthesis_4: combine_four_major_surfaces
  readiness_default_minimums:
    closed_campaign_count: 3
    usable_ingredient_group_count: 8
    required_surface_count: 3
    requires_some_mt5_or_proxy_vs_mt5_evidence: true
    unresolved_mechanical_parity_as_main_blocker_allowed: false
  valid_source_material:
    - ingredient_refs_from_closed_campaigns
    - candidate_evidence_from_closed_runs
    - negative_memory_from_closed_runs
    - parity_lessons_from_closed_runs
  invalid_source_material:
    - unresolved_mechanical_parity_mismatch
    - evidence_gap_disguised_as_ingredient
    - adjacent_tuning_request
    - selected_claim_request
  synthesis_due_check_results:
    - not_needed
    - candidate_later
    - open_synthesis
    - blocked_by_parity_or_evidence_gap

stream_policy:
  campaign_stream:
    id_prefix: C
    role: major_hypothesis_discovery
    independent_from_synthesis_stream: true
  synthesis_stream:
    id_prefix: SC
    role: accumulated_ingredient_synthesis
    independent_from_campaign_stream: true
  stream_rules:
    - c_closeout_may_record_synthesis_readiness_without_pausing_c_stream
    - sc_closeout_does_not_force_next_c
    - sc_sequence_is_tracked_in_sc_stream
    - c_sequence_is_tracked_in_c_stream
    - sc_must_not_be_nested_inside_c_folder

run_policy:
  run_is_hypothesis_variant: true
  proxy_requires_matching_mt5_probe: true
  proxy_kpi_is_not_screening_gate_for_mt5: true
  run_completion_requires_proxy_mt5_and_proxy_vs_mt5_kpi: true
  every_run_must_declare_all_surfaces:
    - model
    - feature
    - trade_logic
    - label
  true_variant_requires:
    - a distinct verification question inside the campaign hypothesis
    - meaningful change to at least one required surface
    - explicit statement of which surfaces are fixed and which surfaces changed
    - variant_boundary explaining why this is not repair or micro tuning
  not_valid_as_new_run:
    - threshold_nudge_only
    - window_nudge_only
    - sl_tp_nudge_only
    - parameter_micro_tune_only
    - retry_of_failed_run_without_new_question
    - repair_of_same_intent_disguised_as_variant

lifecycle:
  phases:
    - campaign_open
    - run_variant_design
    - proxy_diverse_probe
    - proxy_kpi_record
    - mt5_probe_attempt
    - mt5_kpi_record
    - proxy_vs_mt5_kpi_record
    - mechanical_parity_check
    - mechanical_parity_repair_loop
    - intent_parity_check
    - run_repair_or_tune_loop
    - run_closeout
    - campaign_closeout
    - synthesis_due_check
    - synthesis_open_when_due
    - synthesis_closeout
  phase_rules:
    campaign_open:
      requires:
        - campaign_id
        - major_hypothesis
        - required_surfaces
        - claim_boundary
    run_variant_design:
      requires:
        - run_id
        - hypothesis_variant
        - all_required_surfaces
        - variant_boundary
    proxy_diverse_probe:
      purpose: create the proxy side of the run evidence pair
      forbids:
        - adjacent_tuning_as_exploration
        - selected_claim
        - proxy_only_run_judgment
    proxy_kpi_record:
      purpose: record proxy KPIs before the matching MT5 probe
      must_not:
        - decide_good_or_bad_without_mt5
        - skip_mt5_because_proxy_kpi_is_weak
    mt5_probe_attempt:
      purpose: gather MT5 evidence for the same run hypothesis and proxy surface
      claim_authority: false
      not_enough_for:
        - runtime_probe_completed
        - economics_pass
        - runtime_authority
        - live_ready
    mt5_kpi_record:
      purpose: record MT5 probe KPIs for the same run hypothesis
    proxy_vs_mt5_kpi_record:
      purpose: record comparison KPIs before parity judgment
    mechanical_parity_check:
      purpose: confirm proxy and MT5 interpret the same rules the same way
    mechanical_parity_repair_loop:
      counts_toward_hypothesis_repair_limit: false
      purpose: repair implementation or interpretation mismatch before judging the hypothesis
    intent_parity_check:
      purpose: confirm MT5 behavior matches the original hypothesis intent
    run_repair_or_tune_loop:
      counts_toward_hypothesis_repair_limit: true
      purpose: repair or tune the run hypothesis after evidence shows the intent needs adjustment
    run_closeout:
      purpose: close a run when its useful learning path is exhausted or recorded
    campaign_closeout:
      purpose: close a campaign when no meaningful new variant remains inside the major hypothesis
    synthesis_due_check:
      purpose: record whether accumulated campaign evidence is becoming synthesis-ready
      required_at_campaign_closeout: true
      allowed_results:
        - not_needed
        - candidate_later
        - open_synthesis
        - blocked_by_parity_or_evidence_gap
    synthesis_open_when_due:
      purpose: open campaigns/SC0001_short_slug only when accumulated synthesis readiness is sufficient
      must_not:
        - create_SC_inside_C_folder
        - treat_SC_as_run
        - use_SC_to_hide_adjacent_tuning
    synthesis_closeout:
      purpose: close a synthesis work unit inside the synthesis stream
      must_not:
        - control_campaign_stream_numbering
        - claim_selected_surface
        - claim_runtime_authority

repair_policy:
  default_hypothesis_repair_limit_per_run: 3
  hypothesis_repair_limit_scope:
    counts:
      - hypothesis_repair
      - intent_repair
      - micro_tuning
      - threshold_adjustment
      - window_adjustment
      - trade_logic_parameter_adjustment
      - label_boundary_adjustment
      - model_parameter_adjustment
    excludes:
      - mechanical_parity_fix
      - unit_interpretation_fix
      - bid_ask_mid_alignment_fix
      - bar_timestamp_alignment_fix
      - spread_or_slippage_semantics_fix
      - sl_tp_execution_order_fix
  extension_beyond_default_requires:
    - explicit_reason
    - evidence_that_more_learning_remains
    - unchanged_campaign_hypothesis_boundary
    - record_of_prior_repairs

parity_policy:
  mechanical_parity:
    question: did proxy and MT5 execute the same rules with the same interpretation
    must_repair_when_failed: true
    repair_counts_toward_hypothesis_repair_limit: false
    hypothesis_judgment_before_repair_allowed: false
    check_examples:
      - sl_tp_point_unit
      - bid_ask_mid_price_basis
      - closed_bar_timestamp_basis
      - spread_slippage_commission_semantics
      - entry_exit_ordering
      - position_lifecycle_rules
    failed_result:
      status: mechanical_parity_failed
      action: repair_mechanics_then_repeat_mt5_probe_attempt
      hypothesis_judgment_allowed: false
    non_portable_exception:
      allowed_only_when:
        - mt5_cannot_represent_proxy_surface
        - required_runtime_information_is_not_available_in_mt5
        - platform_constraint_blocks_same_position_lifecycle
      required_action:
        - classify_surface_as_non_portable
        - record_do_not_reuse_as_future_hypothesis_input
        - close_run_without_candidate
  intent_parity:
    question: did MT5 behavior match the original hypothesis intent
    repair_counts_toward_hypothesis_repair_limit: true
    check_examples:
      - expected_market_regime_behavior
      - expected_entry_selectivity
      - expected_exit_shape
      - expected_risk_shape
      - expected_signal_frequency
    failed_result:
      status: intent_parity_failed
      action: analyze_behavior_then_repair_if_meaningful_else_close_run
      hypothesis_judgment_allowed: true

gate_report_policy:
  role: lightweight_decision_receipt
  gate_report_is_not:
    - test_runner
    - kpi_recalculator
    - full_pytest_suite
    - registry_sync_engine
    - campaign_closeout_document
    - stage_document
  allowed_gates:
    evidence_gate:
      purpose: confirm required evidence records exist
      checks:
        - proxy_kpi_path_recorded
        - mt5_kpi_path_recorded
        - proxy_vs_mt5_kpi_path_recorded
        - artifact_lineage_path_recorded
    parity_gate:
      purpose: summarize parity status from proxy_vs_mt5 evidence
      checks:
        - mechanical_parity_status
        - intent_parity_status
        - repair_required
        - non_portable_status_when_applicable
    claim_gate:
      purpose: confirm the run did not exceed claim authority
      checks:
        - label_selected_false
        - feature_set_selected_false
        - model_selected_false
        - runtime_authority_false
        - live_ready_false
  allowed_decisions:
    - repair_mechanical_parity
    - repair_intent_mismatch
    - close_no_candidate
    - close_with_candidate_evidence
    - close_non_portable
    - repeat_mt5_probe_after_mechanical_fix
    - defer_with_reason
  forbidden_decisions:
    - selected_model
    - selected_feature_set
    - selected_label
    - runtime_authority
    - live_ready
    - promotion_ready
  report_size_policy:
    concise: true
    store_details_in_kpi_and_artifact_lineage: true
    do_not_duplicate_kpi_tables: true

status_values:
  campaign:
    - draft
    - open
    - proxy_exploration
    - mt5_probe_attempts
    - repair_loop
    - closing
    - closed_no_candidate
    - closed_with_candidate_evidence
  synthesis:
    - draft
    - open
    - proxy_exploration
    - mt5_probe_attempts
    - parity_review
    - repair_loop
    - closing
    - closed_no_candidate
    - closed_with_candidate_evidence
    - closed_return_to_campaign
  run:
    - draft
    - proxy_planned
    - proxy_done
    - proxy_repair_required
    - mt5_probe_ready
    - mt5_probe_attempted
    - mechanical_parity_failed
    - intent_parity_failed
    - repair_required
    - parity_evidence_recorded
    - closed_no_candidate
    - closed_with_candidate_evidence

closeout_policy:
  run_close_when_any:
    - useful_learning_path_exhausted
    - default_hypothesis_repair_limit_reached
    - evidence_answers_run_question
    - variant_invalidated_by_proxy_mt5_parity_evidence
    - variant_invalidated_by_mt5_evidence
  campaign_close_when:
    - no_meaningful_new_variant_remains_inside_hypothesis_boundary
    - remaining_work_would_only_be_adjacent_tuning
    - candidate_evidence_is_sufficient_for_next_decision_record
    - campaign_hypothesis_is_invalidated_or_exhausted
    - synthesis_due_check_recorded
  campaign_must_not_close_because:
    - one_proxy_result_looks_good
    - one_mt5_probe_attempt_looks_good
    - selected_claim_is_desired
    - tuning_can_continue_without_new_question
  synthesis_close_when_any:
    - synthesis_question_answered
    - source_ingredient_mix_invalidated
    - useful_learning_path_exhausted
    - candidate_evidence_recorded
  after_synthesis_closeout:
    campaign_stream_continues_independently: true
    synthesis_stream_continues_independently: true
    does_not_set_next_campaign_id: true
    does_not_create_selected_claim: true

artifact_policy:
  lineage_contract: contracts/artifact_lineage.yaml
  campaign_root_files:
    - campaign.yaml
    - inputs.yaml
    - selected.yaml
  synthesis_root_files:
    - synthesis.yaml
    - ingredient_refs.yaml
    - synthesis_queue.yaml
    - selected.yaml
  run_root_files:
    - run_manifest.json
    - kpi/proxy.json
    - kpi/mt5.json
    - kpi/proxy_vs_mt5.json
    - gate_report.json
    - artifact_lineage.json
  synthesis_run_root_files:
    - run_manifest.json
    - kpi/proxy.json
    - kpi/mt5.json
    - kpi/proxy_vs_mt5.json
    - gate_report.json
    - artifact_lineage.json
  evidence_policy:
    store_evidence_under_run_folder: true
    record_repo_relative_paths: true
    record_hashes_for_durable_artifacts: true
    raw_data_in_campaign_folder_allowed: false
    processed_reusable_data_in_campaign_folder_allowed: false

claim_boundary:
  claim_authority: false
  may_record:
    - proxy_evidence
    - mt5_probe_attempt_evidence
    - mechanical_parity_result
    - intent_parity_result
    - run_kpi_proxy
    - run_kpi_mt5
    - run_kpi_proxy_vs_mt5
    - synthesis_due_check
    - synthesis_ingredient_refs
    - repair_note
    - gate_result
    - candidate_evidence
  must_not_assert:
    - label_selected
    - feature_set_selected
    - model_selected
    - runtime_probe_completed
    - economics_pass
    - materialization_ready
    - runtime_authority
    - onnx_ready
    - promotion_ready
    - live_ready
