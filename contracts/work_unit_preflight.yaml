schema: axiom_rift_work_unit_preflight_contract_v1
status: draft_active
encoding: ascii_only

purpose: define lightweight checks before creating C campaigns, SC synthesis work units, R runs, or SR synthesis runs

allowed_use:
  - verify next_id exists before work unit creation
  - verify target folder does not already exist
  - verify required templates exist
  - verify creation does not require claim_state updates
  - verify selected and runtime claim flags remain false
  - verify no raw or processed data will be placed in campaign folders

forbidden_use:
  - run data jobs
  - run model jobs
  - run MT5 jobs
  - run ONNX export or validation
  - run installers
  - invoke MCP
  - create GitHub issues
  - create worktrees
  - create pull requests
  - update claim_state as complete

required_sources:
  - registries/work_unit_registry.yaml
  - registries/template_registry.yaml
  - contracts/work_unit_creation.yaml
  - contracts/campaign_lifecycle.yaml
  - contracts/claims.yaml

preflight_checks:
  numbering:
    - next_id_present
    - next_id_matches_stream_prefix
    - target_folder_absent
    - sc_not_nested_inside_c

  templates:
    - template_set_exists
    - required_template_paths_exist
    - template_files_parse_as_yaml_or_json
    - template_files_ascii_only

  claim_boundary:
    - selected_false
    - label_selected_false
    - feature_set_selected_false
    - model_selected_false
    - runtime_probe_completed_false
    - economics_pass_false
    - materialization_ready_false
    - runtime_authority_false
    - onnx_ready_false
    - promotion_ready_false
    - live_ready_false

  filesystem:
    - no_top_level_scratch_notes_experiment_scripts_or_stage_folder
    - no_raw_data_in_campaign_folder
    - no_processed_reusable_data_in_campaign_folder
    - active_files_ascii_only

  execution_boundary:
    - no_data_or_model_runtime_execution
    - no_external_script_execution
    - no_installer_execution
    - no_mcp_invocation
    - no_github_issue_or_pr_automation

preflight_results:
  allowed:
    - pass
    - blocked
  blocked_requires:
    - blocking_check
    - reason
    - required_user_or_contract_action

registry_policy:
  preflight_does_not_advance_next_id: true
  preflight_does_not_mark_active_work_unit: true
  preflight_does_not_write_run_registry_event: true
  preflight_does_not_update_claim_state: true

claim_boundary:
  claim_authority: false
  selected: false
  label_selected: false
  feature_set_selected: false
  model_selected: false
  runtime_probe_completed: false
  economics_pass: false
  materialization_ready: false
  runtime_authority: false
  onnx_ready: false
  promotion_ready: false
  live_ready: false
