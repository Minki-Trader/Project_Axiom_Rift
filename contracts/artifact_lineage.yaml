schema: axiom_rift_artifact_lineage_contract_v1
status: draft_active
encoding: ascii_only

purpose: define lightweight artifact lineage records for campaign and synthesis run evidence without creating selected, runtime, promotion, ONNX, or live claims

allowed_use:
  - record repo-relative paths for run evidence artifacts
  - record hashes for durable artifacts
  - connect KPI records, MT5 reports, gate reports, and generated outputs to their parent run
  - distinguish proxy, mt5, proxy_vs_mt5, gate, and diagnostic artifact roles
  - support later audit, replay, or comparison by locating evidence files

forbidden_use:
  - use local absolute paths as durable artifact identity
  - use helper prefixes such as long-path plumbing as artifact identity
  - place raw data or processed reusable datasets inside campaign folders
  - treat artifact existence as selected model, selected feature set, selected label, runtime authority, ONNX readiness, promotion readiness, economics pass, or live readiness
  - copy external repo artifacts into Axiom active truth without an Axiom decision record
  - use artifact_lineage as a registry sync engine or test runner

required_fields:
  lineage:
    - schema
    - work_unit_id
    - run_id
    - lineage_id
    - created_at_utc
    - artifact_records
    - deferred_with_reason
    - claim_boundary
  artifact_records_item:
    - artifact_id
    - artifact_role
    - artifact_type
    - repo_relative_path
    - sha256
    - produced_by
    - source_inputs
    - linked_kpi_family
    - mutable
    - claim_authority

artifact_roles:
  - proxy_kpi
  - mt5_kpi
  - proxy_vs_mt5_kpi
  - gate_report
  - mt5_report
  - diagnostic_output
  - repair_note
  - candidate_evidence

artifact_types:
  - json
  - jsonl
  - yaml
  - csv
  - html
  - txt
  - log
  - binary

path_policy:
  durable_identity: repo_relative_path_plus_sha256
  allowed_roots:
    - campaigns/
    - artifacts/
    - registries/
  forbidden_roots_for_run_artifacts:
    - data/raw/
    - data/processed/
    - archive/
  local_absolute_path_allowed_for_diagnostics: false

hash_policy:
  required_hash: sha256
  hash_required_when:
    - artifact_is_durable_evidence
    - artifact_is_reused_across_runs
    - artifact_is_linked_from_gate_report
    - artifact_is_linked_from_kpi
  deferred_hash_requires:
    - field
    - reason
    - blocking_condition
    - revisit_when

lineage_policy:
  one_lineage_file_per_run: true
  default_path: campaigns/<work_unit_id>/runs/<run_id>/artifact_lineage.json
  synthesis_path: campaigns/<synthesis_id>/runs/<synthesis_run_id>/artifact_lineage.json
  registry_rows_are_indexes_only: true
  gate_report_may_reference_lineage: true
  kpi_records_may_reference_lineage: true
  artifact_lineage_must_not_duplicate_full_kpi_tables: true

claim_boundary:
  claim_authority: false
  may_record:
    - artifact_identity
    - artifact_hash
    - evidence_path
    - parent_run
    - linked_kpi_family
    - deferred_hash_reason
  must_not_assert:
    - label_selected
    - feature_set_selected
    - model_selected
    - runtime_probe_completed
    - economics_pass
    - materialization_ready
    - runtime_authority
    - onnx_ready
    - promotion_ready
    - live_ready
