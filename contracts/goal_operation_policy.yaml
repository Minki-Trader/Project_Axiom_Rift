schema: axiom_rift_goal_operation_policy_v1
status: draft_active
encoding: ascii_only
audience: codex_only

purpose: allow short goal prompts to drive Axiom operations without objective drift, missing evidence, proxy-only scouts, or premature selected/runtime/live claims

governing_sources:
  project_goal: contracts/project_goal_contract.md
  evaluation: contracts/evaluation_contract.md
  campaign_lifecycle: contracts/campaign_lifecycle.yaml
  work_unit_creation: contracts/work_unit_creation.yaml
  claims: contracts/claims.yaml
  decision_cursor: registries/decision_cursor.yaml
  mt5_guardrail_skill: .agents/skills/axiom-mt5-validation-guardrails/SKILL.md

top_level_goal:
  market:
    broker: FPMarkets
    symbol: US100
    timeframe: M5
  target_entry_events_per_active_day:
    min: 5
    max: 10
    status: target_seed
  monthly_drawdown:
    target: controlled
    exact_threshold_status: not_frozen
  profitability:
    target: strong_profit_factor_after_realistic_spread_and_slippage
    exact_threshold_status: not_frozen
  cost_model:
    commission_per_trade: 0
    synthetic_commission_allowed: false
    spread_stress_test_allowed: true
    slippage_stress_test_allowed: true
  materialization:
    target:
      - ea_ready_artifact
      - onnx_ready_artifact
      - pre_live_handoff_package
    live_scope: out_of_scope

discovery_freedom_policy:
  preserve_unrestricted_discovery_until_evidence_freeze: true
  exploration_variables:
    - label_shape
    - label_horizon
    - feature_family
    - feature_count
    - feature_order
    - model_family
    - model_count
    - model_objective
    - ensemble_structure
    - direction_specific_models
    - exit_models
    - score_surfaces
    - filters
    - trade_logic
    - trade_shape
  freeze_requires:
    - active_contract_or_decision_record
    - dataset_identity
    - split_boundaries
    - feature_order_hash_when_applicable
    - artifact_identity_hash_when_applicable
    - claim_boundary
  must_not:
    - inherit_archived_feature_set_as_selection
    - inherit_archived_model_family_as_selection
    - freeze_feature_count_without_evidence
    - freeze_model_structure_without_evidence
    - treat_current_run_surfaces_as_project_selection

sizing_policy:
  early_discovery_default: fixed_lot
  fixed_lot_reason: compare_signal_quality_without_compounding_or_sizing_distortion
  equity_percent_sizing:
    allowed_later: true
    phase: robustness_or_growth_validation_after_candidate_quality
    exact_rule_frozen: false
  must_not:
    - use_equity_sizing_to_rescue_weak_signal_quality_in_early_discovery
    - freeze_exact_sizing_rule_before_candidate_quality_is_established
    - treat_fixed_lot_discovery_as_final_runtime_sizing

goal_prompt_policy:
  short_goal_allowed: true
  short_goal_expansion_required: true
  user_goal_is_not_permission_to_violate_contracts: true
  default_next_step_when_no_active_campaign: choose_or_open_next_major_campaign
  no_active_campaign_after_closeout_allowed: true

operation_flow:
  - boot_context
  - load_goal_policy
  - classify_goal
  - check_active_work_unit_state
  - resolve_decision_cursor
  - apply_terminal_evidence_priority
  - classify_repo_debt_scope
  - choose_operation_class
  - require_pre_open_intelligence_when_new_run
  - create_or_update_only_required_artifacts
  - run_required_evidence_loop
  - record_failure_or_candidate_as_evidence
  - update_reentry_registries_and_claim_state
  - validate_changed_surfaces

operation_classes:
  new_campaign: major_hypothesis_only
  new_run: true_variant_inside_active_campaign_only
  repair: mechanical_or_intent_repair_with_scope_record
  closeout: evidence_based_only
  synthesis: only_when_readiness_minimums_met
  pause: when_next_work_requires_user_hypothesis_or_external_state

decision_state_policy:
  terminal_evidence_priority_enabled: true
  cursor_registry: registries/decision_cursor.yaml
  cursor_role: compact_next_decision_pointer_not_evidence
  authority_order:
    - run_gate_report_decision_or_status
    - run_manifest_status
    - required_kpi_files_and_closeout_receipts
    - artifact_lineage_deferred_with_reason
    - campaign_yaml_active_run_and_closeout_state
    - claim_state_latest_operation
    - reentry_next_work
  stale_pointer_rule: terminal_run_receipt_outranks_planning_pointer
  reentry_completed_log_role: history_only_not_decision_authority
  must_not:
    - use_reentry_completed_history_as_current_decision_authority
    - continue_old_next_action_when_run_gate_report_is_terminal
    - treat_decision_cursor_as_evidence_or_claim_authority

repo_debt_scope_policy:
  enabled: true
  keep_validate_repo_state_errors_visible: true
  debt_classes:
    known_nonblocking_for_next_run_decision:
      may_continue_discovery: true
      blocks_selected_claim: true
      blocks_promotion: true
      blocks_handoff: true
      blocks_reproducibility_claim: true
    active_path_blocker:
      may_continue_discovery: false
      requires_repair_before_current_run_evidence: true
    closeout_blocker:
      may_continue_current_evidence_loop: true
      blocks_run_or_campaign_closeout: true
  hash_debt_rule:
    default_class: known_nonblocking_for_next_run_decision
    active_run_artifact_hash_debt_class: closeout_blocker
    selected_or_promotion_hash_debt_class: active_path_blocker
    covered_codes:
      - artifact_lineage_hash_mismatch
      - artifact_lineage_hash_missing
  must_not:
    - hide_hash_mismatch_errors
    - mark_repo_state_ok_when_global_lineage_errors_exist
    - repair_unrelated_hash_debt_during_active_goal_session_without_scope_need

pre_open_intelligence_policy:
  enabled: true
  applies_to: future_new_runs
  effective_local_date: '2026-07-05'
  not_retroactive_for_existing_runs: true
  storage: run_manifest.pre_open_decision
  required_fields:
    - novelty_score
    - adjacent_tuning_risk
    - expected_information_gain
    - failure_memory_used
    - surface_distance
    - mt5_portability
    - decision_payoff
    - reject_if_failure_only_repeats_known_negative_memory
    - true_variant_summary
    - adjacent_tuning_rejection_reason
  score_rules:
    novelty_score_min_for_new_run: 3
    adjacent_tuning_risk_allowed:
      - low
      - medium
    expected_information_gain_allowed:
      - medium
      - high
    decision_payoff_allowed:
      - medium
      - high
    mt5_portability_allowed:
      - clear
      - risky
    mt5_portability_non_portable_action: do_not_open_run
  surface_distance_rule:
    at_least_one_surface_must_change: true
    surfaces:
      - label
      - feature
      - model
      - trade_logic
  must_not:
    - open_run_with_low_information_gain
    - open_run_with_high_adjacent_tuning_risk
    - open_run_when_failure_only_repeats_known_negative_memory
    - open_run_for_threshold_window_sltp_session_or_activity_nudge_only

run_required_sequence:
  - proxy_kpi
  - mt5_logic_parity_kpi
  - proxy_vs_mt5_logic_parity_kpi
  - mt5_tick_kpi
  - execution_divergence_kpi
  - fold_isolated_mt5_tick_kpi
  - fold_isolated_execution_divergence_kpi
  - closeout_gate

failure_asset_policy:
  enabled: true
  failure_is_asset: true
  broken_code_is_failure_asset: false
  allowed_failure_assets:
    - negative_memory
    - parity_lesson
    - execution_divergence_lesson
    - evidence_gap
    - non_portable_lesson
  must_record:
    - hypothesis_tested
    - evidence_paths
    - reason_not_candidate
    - next_boundary
  must_not:
    - delete_failed_runs
    - overwrite_kpi_to_make_results_better
    - hide_failure_as_missing_data
    - convert_failure_to_selected_claim
    - keep_adjacent_tuning_alive_as_new_variant

broken_code_policy:
  enabled: true
  record_and_quit_allowed: false
  broken_code_is_hypothesis_evidence: false
  broken_code_may_close_run: false
  broken_code_may_close_campaign: false
  missing_kpi_from_broken_code_counts_as_evidence: false
  required_response:
    - classify_failure_surface
    - inspect_logs_and_artifacts
    - repair_code_runner_parser_or_config_when_in_scope
    - rerun_same_validation_after_repair
    - record_evidence_only_after_successful_execution
  blocker_allowed_only_when:
    - root_cause_identified
    - reproduction_command_recorded
    - failing_artifact_path_recorded
    - next_concrete_repair_step_recorded
    - user_or_external_state_required
  forbidden_closeout_basis:
    - code_did_not_run
    - parser_failed_without_repair_attempt
    - compile_failed_without_repair_attempt
    - runner_failed_without_repair_attempt
    - mt5_terminal_or_config_failure_without_repair_attempt
    - missing_kpi_caused_by_broken_code

anti_drift_rules:
  preserve_top_level_goal: true
  proxy_only_scout_allowed: false
  weak_proxy_may_skip_mt5: false
  aggregate_mt5_may_close_run: false
  fold_isolated_closeout_required: true
  broken_code_record_and_quit_allowed: false
  broken_code_may_close_run: false
  missing_kpi_from_broken_code_may_count_as_evidence: false
  selected_claim_without_contract_and_evidence_allowed: false
  runtime_or_live_claim_allowed: false
  archive_as_active_truth_allowed: false
  adjacent_tuning_as_new_run_allowed: false
  threshold_window_sltp_nudge_as_new_run_allowed: false
  campaign_close_without_synthesis_due_check_allowed: false
  run_closeout_without_main_push_allowed: false
  stale_reentry_pointer_may_override_terminal_run_evidence: false
  reentry_completed_log_as_decision_authority_allowed: false
  new_run_without_pre_open_decision_allowed: false
  hash_debt_may_be_hidden_or_marked_ok_without_scope_classification: false

closeout_rules:
  run_closeout_basis:
    - fold_isolated_tick_evidence
    - fold_isolated_execution_divergence
    - complete_exception_when_evidence_impossible
  campaign_close_when:
    - no_meaningful_new_variant_remains_inside_boundary
    - remaining_work_is_adjacent_tuning
    - all_relevant_runs_have_closeout_evidence
    - synthesis_due_check_recorded
  closeout_must_update:
    - campaign_or_run_manifest
    - gate_report_when_run
    - selected_boundary
    - reentry
    - relevant_registry
    - decision_registry_when_policy_or_campaign_level_decision

run_closeout_git_policy:
  enabled: true
  applies_to: every_run_closeout
  branch: main
  remote: origin
  remote_branch: origin/main
  required_after_validation:
    - inspect_git_status
    - ensure_local_branch_main
    - sync_with_origin_main_without_discarding_work
    - stage_closeout_scoped_changes_only
    - commit_run_closeout_changes
    - push_main_to_origin
    - report_commit_and_push_result
  run_closeout_done_requires_push: true
  unrelated_dirty_work_policy: preserve_and_exclude_unrelated_changes
  blocker_allowed_only_when:
    - validation_passed_or_blocker_recorded
    - git_root_cause_recorded
    - reproduction_command_recorded
    - next_concrete_git_repair_step_recorded
    - user_or_external_state_required
  must_not:
    - report_run_closeout_done_before_push
    - leave_closeout_changes_local_only
    - force_push
    - reset_hard
    - discard_unrelated_work
    - stage_unrelated_files

validation_minimums:
  structured_files_parse: true
  active_files_ascii_only: true
  validate_templates: true
  validate_active_or_closed_work_unit_when_changed: true
  unit_tests_for_changed_validators_or_cli: true
  git_diff_check: true
  decision_cursor_structured_parse: true
  future_run_pre_open_decision_required: true
  repo_debt_scope_summary_required_when_repo_state_has_errors: true

claim_boundary:
  claim_authority: false
  selected: false
  label_selected: false
  feature_set_selected: false
  model_selected: false
  runtime_probe_completed: false
  economics_pass: false
  materialization_ready: false
  runtime_authority: false
  onnx_ready: false
  promotion_ready: false
  live_ready: false
