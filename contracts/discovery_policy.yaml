schema: axiom_rift_discovery_policy_v1
status: active_policy
audience: codex_only
encoding: ascii_only

decision:
  label_frozen_at_restart: false
  feature_set_frozen_at_restart: false
  imported_fpmarkets_v2_role: archived_reference_only

allowed_exploration:
  - label_horizon
  - label_target
  - class_structure
  - regression_target
  - feature_family
  - external_symbol_input
  - session_feature
  - regime_feature
  - model_objective
  - model_family
  - trade_shape
  - runtime_decision_rule

guardrails:
  no_future_leakage: true
  closed_m5_bar_only: true
  base_frame: US100_M5
  external_alignment: merge_to_us100_closed_bar_timestamp
  candidate_requires_identity_before_reuse: true
  exploration_candidate_is_not_canonical: true

freeze_requirements:
  - active_axiom_contract_or_decision_record
  - dataset_identity
  - split_boundaries
  - feature_order_hash_when_applicable
  - artifact_hashes_when_applicable
  - claim_boundary

archive_refs:
  dir: archive/imported_fpmarkets_v2_delete_after_axiom_contracts/docs/contracts
  active_truth: false
  delete_after_active_contracts_complete: true
  files:
    feature-list_fpmarkets_v2.txt: reference_feature_inventory
    model_input_feature_set_contract_fpmarkets_v2.md: reference_model_input_example
    training_label_split_contract_fpmarkets_v2.md: reference_label_split_example
    feature_calculation_spec_fpmarkets_v2.md: reference_calculation_semantics
    python_feature_parser_spec_fpmarkets_v2.md: reference_parser_semantics
    mt5_ea_input_order_contract_fpmarkets_v2.md: reference_runtime_handoff_semantics
